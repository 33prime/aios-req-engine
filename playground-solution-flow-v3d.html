<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Solution Flow v3d — Haiku Renders</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --green: #3FAF7A; --green-dark: #2A8F5F; --green-pale: rgba(63,175,122,0.08); --green-glow: rgba(63,175,122,0.18);
  --accent: #044159; --accent-pale: rgba(4,65,89,0.05);
  --navy: #0A1E2F;
  --amber: #D4A017; --amber-pale: rgba(212,160,23,0.08);
  --t1: #0A1E2F; --t2: #2D3748; --t3: #4A5568; --t4: #718096; --t5: #A0AEC0;
  --border: #E2E8F0; --bg: #F7FAFC; --card: #FFF; --subtle: #EDF2F7;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--t2);overflow:hidden;height:100vh}
::-webkit-scrollbar{height:5px;width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#CBD5E0;border-radius:3px}
#app{display:flex;flex-direction:column;height:100vh}

/* ── Header ───────────────────────────── */
header{background:var(--navy);padding:14px 32px 12px;flex-shrink:0}
.header-row{display:flex;align-items:center;gap:20px;margin-bottom:8px}
.thesis{font-size:14px;color:rgba(255,255,255,0.82);line-height:1.55;flex:1;max-width:660px}
.thesis em{color:var(--green);font-style:normal;font-weight:600}
.pills{display:flex;gap:10px;flex-shrink:0}
.pill{display:flex;flex-direction:column;align-items:center;padding:4px 13px;border-radius:7px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07)}
.pill-val{font-size:16px;font-weight:700;color:var(--green);line-height:1.2}
.pill-lbl{font-size:8px;color:rgba(255,255,255,0.32);text-transform:uppercase;letter-spacing:0.04em;font-weight:500}
.controls{display:flex;align-items:center;gap:8px}
.persona-pills{display:flex;gap:4px;flex:1}
.ppill{display:flex;align-items:center;gap:4px;padding:2px 9px 2px 2px;border-radius:14px;border:1px solid rgba(255,255,255,0.08);cursor:pointer;transition:all .2s;background:0;color:rgba(255,255,255,0.4);font:500 10px 'Inter',sans-serif}
.ppill:hover{color:rgba(255,255,255,0.75);border-color:rgba(255,255,255,0.18)}
.ppill.active{background:rgba(255,255,255,0.08);border-color:var(--pc);color:#fff}
.pavatar{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:700;color:#fff;flex-shrink:0}
.present-btn{padding:4px 14px;border-radius:7px;border:1px solid rgba(63,175,122,0.3);background:rgba(63,175,122,0.06);color:var(--green);font:600 10px 'Inter',sans-serif;cursor:pointer;transition:all .2s}
.present-btn:hover{background:rgba(63,175,122,0.15);border-color:var(--green)}

/* ── Canvas ───────────────────────────── */
.main{flex:1;overflow:auto;position:relative}
.canvas{position:relative;min-height:100%;display:flex;flex-direction:column}
.phase-lanes{display:flex;flex:1;min-height:480px;position:relative;gap:1px}

.phase-lane{flex:1;min-width:0;display:flex;flex-direction:column;padding:0 10px;position:relative}
.phase-lane::before{content:'';position:absolute;inset:0;pointer-events:none;z-index:0}
.phase-lane.core::before{background:linear-gradient(180deg, rgba(63,175,122,0.025) 0%, rgba(63,175,122,0.06) 100%)}
.phase-lane.entry::before{background:rgba(4,65,89,0.018)}
.phase-lane.output::before{background:rgba(10,30,47,0.015)}
.phase-lane.admin::before{background:rgba(0,0,0,0.01)}

.lane-header{padding:14px 6px 10px;position:relative;z-index:1;flex-shrink:0}
.lane-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;margin-bottom:2px}
.lane-sublabel{font-size:10px;line-height:1.3}
.lane-label.entry-l{color:var(--accent)}.lane-sublabel.entry-s{color:rgba(4,65,89,0.5)}
.lane-label.core-l{color:var(--green-dark)}.lane-sublabel.core-s{color:rgba(63,175,122,0.6)}
.lane-label.output-l{color:var(--navy)}.lane-sublabel.output-s{color:rgba(10,30,47,0.4)}
.lane-label.admin-l{color:var(--t4)}.lane-sublabel.admin-s{color:var(--t5)}
.lane-cards{flex:1;display:flex;flex-direction:column;gap:8px;padding:2px 0 14px;position:relative;z-index:1;justify-content:center}

/* ── Cards — color-coded by phase ─────── */
.station{
  border-radius:10px;padding:14px 16px;cursor:pointer;
  transition:all .3s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden;
}
.station:hover{transform:translateY(-2px)}
.station.selected{box-shadow:0 0 0 2px var(--green-glow)}
.station.dimmed{opacity:.15;pointer-events:none}

/* Phase color coats */
.station.phase-entry{
  background:linear-gradient(135deg, #fff 0%, rgba(4,65,89,0.04) 100%);
  border:1px solid rgba(4,65,89,0.12);
}
.station.phase-entry:hover{border-color:var(--accent);box-shadow:0 4px 16px rgba(4,65,89,0.08)}

.station.phase-core_experience{
  background:linear-gradient(135deg, #fff 0%, rgba(63,175,122,0.05) 100%);
  border:1px solid rgba(63,175,122,0.20);
}
.station.phase-core_experience:hover{border-color:var(--green);box-shadow:0 6px 20px rgba(63,175,122,0.12)}

.station.phase-output{
  background:linear-gradient(135deg, #fff 0%, rgba(10,30,47,0.03) 100%);
  border:1px solid rgba(10,30,47,0.10);
}
.station.phase-output:hover{border-color:var(--navy);box-shadow:0 4px 16px rgba(10,30,47,0.08)}

.station.phase-admin{
  background:linear-gradient(135deg, #fff 0%, rgba(0,0,0,0.02) 100%);
  border:1px solid rgba(0,0,0,0.08);
}
.station.phase-admin:hover{border-color:var(--t4);box-shadow:0 4px 16px rgba(0,0,0,0.06)}

/* Core cards slightly bigger */
.station.phase-core_experience{padding:16px 18px}
.station.phase-core_experience .st-title{font-size:13px;font-weight:700}

.st-top{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.st-idx{width:20px;height:20px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0}
.st-idx.entry-idx{background:rgba(4,65,89,0.08);color:var(--accent)}
.st-idx.core-idx{background:var(--green-pale);color:var(--green-dark)}
.st-idx.output-idx{background:rgba(10,30,47,0.06);color:var(--navy)}
.st-idx.admin-idx{background:rgba(0,0,0,0.04);color:var(--t4)}
.st-title{font-size:12px;font-weight:600;color:var(--t1);line-height:1.3;flex:1}
.st-personas{display:flex;margin-left:auto;flex-shrink:0}
.pdot{width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:6px;font-weight:700;color:#fff;border:2px solid #fff;margin-left:-3px}
.pdot:first-child{margin-left:0}

/* Human-readable blurb (not technical goal) */
.st-blurb{font-size:10px;color:var(--t3);line-height:1.5;margin-bottom:6px}
.station.phase-core_experience .st-blurb{font-size:11px;color:var(--t2)}

/* Transformation on core cards */
.st-transform{display:flex;gap:6px;align-items:center;padding:5px 9px;border-radius:6px;background:rgba(63,175,122,0.05);margin-bottom:4px}
.st-tf-before{font-size:9px;color:var(--t4);text-decoration:line-through;text-decoration-color:rgba(0,0,0,0.18)}
.st-tf-arrow{font-size:10px;color:var(--green);font-weight:700}
.st-tf-after{font-size:9px;color:var(--green-dark);font-weight:600}

.st-bottom{display:flex;align-items:center;gap:4px;margin-top:4px;flex-wrap:wrap}
.st-ai-badge{display:inline-flex;align-items:center;gap:3px;font-size:8px;font-weight:600;color:var(--accent);padding:2px 7px;border-radius:3px;background:rgba(4,65,89,0.05)}
.st-q-badge{display:inline-flex;align-items:center;gap:3px;font-size:8px;font-weight:600;color:#8B6914;padding:2px 7px;border-radius:3px;background:var(--amber-pale)}

/* ── Momentum ─────────────────────────── */
.momentum-strip{height:34px;background:var(--card);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 32px;gap:12px;flex-shrink:0}
.mom-label{font-size:8px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:var(--t5);white-space:nowrap}
.mom-track{flex:1;height:4px;background:var(--subtle);border-radius:2px;overflow:hidden}
.mom-fill{height:100%;border-radius:2px;background:linear-gradient(90deg, var(--accent) 0%, var(--green) 100%);transition:width 0.8s ease}
.mom-pct{font-size:11px;font-weight:700;color:var(--green)}

/* ── Detail Panel ─────────────────────── */
.panel-backdrop{display:none;position:fixed;inset:0;z-index:180;background:rgba(10,30,47,0.10)}
.panel-backdrop.open{display:block}
.detail-panel{
  position:fixed;right:-520px;top:0;bottom:0;z-index:200;width:480px;max-width:90vw;
  background:var(--card);box-shadow:-6px 0 32px rgba(10,30,47,0.10);
  display:flex;flex-direction:column;transition:right 0.3s cubic-bezier(.4,0,.2,1);
}
.detail-panel.open{right:0}
.dp-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:10px;flex-shrink:0}
.dp-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0}
.dp-meta{flex:1;min-width:0}
.dp-title{font-size:14px;font-weight:700;color:var(--t1);line-height:1.25}
.dp-goal{font-size:11px;color:var(--t4);line-height:1.4;margin-top:2px}
.dp-close{width:26px;height:26px;border-radius:50%;border:1px solid var(--border);background:var(--subtle);color:var(--t4);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:0.15s}
.dp-close:hover{background:var(--border);color:var(--t1)}

.dp-content{flex:1;overflow-y:auto;padding:14px 18px}
.dp-section{margin-bottom:12px}
.dp-label{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:var(--t5);margin-bottom:5px}
.dp-narrative{font-size:12px;line-height:1.65;color:var(--t2);padding:10px 12px;background:var(--subtle);border-radius:7px;border-left:3px solid var(--green)}
.dp-ba{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.dp-ba-side{padding:8px 10px;border-radius:6px}
.dp-ba-side.before{background:rgba(4,65,89,0.03);border:1px solid rgba(4,65,89,0.08)}
.dp-ba-side.after{background:rgba(63,175,122,0.03);border:1px solid rgba(63,175,122,0.08)}
.dp-ba-lbl{font-size:8px;font-weight:600;text-transform:uppercase;letter-spacing:0.04em;margin-bottom:4px}
.dp-ba-side.before .dp-ba-lbl{color:var(--accent)}
.dp-ba-side.after .dp-ba-lbl{color:var(--green-dark)}
.dp-ba-item{font-size:10px;color:var(--t3);padding:1px 0;line-height:1.4}
.dp-ai{padding:8px 10px;border-radius:6px;background:rgba(4,65,89,0.03);border:1px solid rgba(4,65,89,0.08)}
.dp-ai-role{font-size:11px;color:var(--t2);font-weight:500;margin-bottom:3px}
.dp-ai-beh{font-size:10px;color:var(--t3);padding:1px 0;line-height:1.4}
.dp-ai-beh::before{content:'';display:inline-block;width:4px;height:4px;border-radius:50%;background:var(--accent);margin-right:6px;vertical-align:middle}
.dp-question{padding:7px 9px;border-radius:5px;background:var(--subtle);margin-bottom:5px;display:flex;gap:7px}
.dp-q-icon{width:16px;height:16px;border-radius:50%;background:var(--amber-pale);color:#8B6914;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;flex-shrink:0;margin-top:1px}
.dp-q-text{font-size:10px;color:var(--t2);line-height:1.4}
.dp-q-ctx{font-size:9px;color:var(--t4);margin-top:1px}
.dp-fields{display:grid;grid-template-columns:1fr 1fr;gap:3px}
.dp-field{display:flex;align-items:center;gap:4px;font-size:9px;padding:3px 5px;border-radius:3px;background:rgba(0,0,0,0.02)}
.dp-field-dot{width:4px;height:4px;border-radius:50%;flex-shrink:0}
.dp-field-dot.known{background:var(--green)}.dp-field-dot.inferred{background:var(--accent)}.dp-field-dot.guess{background:var(--amber)}.dp-field-dot.unknown{background:#CBD5E0}
.dp-field-name{flex:1;color:var(--t2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dp-field-val{color:var(--t4);font-size:8px;flex-shrink:0}

/* Preview Button */
.preview-btn{
  display:flex;align-items:center;justify-content:center;gap:8px;width:100%;
  padding:11px 16px;border-radius:8px;border:1.5px solid rgba(63,175,122,0.3);
  background:rgba(63,175,122,0.04);color:var(--green-dark);font:600 12px 'Inter',sans-serif;
  cursor:pointer;transition:all 0.2s;margin-bottom:12px;
}
.preview-btn:hover{background:rgba(63,175,122,0.10);border-color:var(--green);color:var(--green)}

/* ── Preview Modal ────────────────────── */
.preview-overlay{display:none;position:fixed;inset:0;z-index:300;background:rgba(10,30,47,0.4)}
.preview-overlay.open{display:flex;align-items:stretch}

/* Preview takes the LEFT area, panel stays on right */
.preview-stage{
  flex:1;display:flex;align-items:center;justify-content:center;padding:32px;
  margin-right:480px;
}
.preview-frame{
  background:var(--card);border-radius:12px;width:100%;max-width:800px;
  max-height:90vh;box-shadow:0 20px 60px rgba(10,30,47,0.25);
  display:flex;flex-direction:column;overflow:hidden;
  animation:prevIn 0.3s cubic-bezier(.4,0,.2,1);
}
@keyframes prevIn{from{opacity:0;transform:scale(0.96) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}

.pf-chrome{
  display:flex;align-items:center;padding:10px 16px;
  background:linear-gradient(180deg, #FAFAFA 0%, #F0F0F0 100%);border-bottom:1px solid var(--border);
  flex-shrink:0;gap:8px;
}
.pf-dots{display:flex;gap:5px}
.pf-dot{width:8px;height:8px;border-radius:50%}
.pf-dot.r{background:#FF5F57}.pf-dot.y{background:#FEBC2E}.pf-dot.g{background:#28C840}
.pf-title{flex:1;text-align:center;font-size:11px;font-weight:500;color:var(--t4)}
.pf-close{width:24px;height:24px;border-radius:50%;border:1px solid var(--border);background:var(--card);color:var(--t4);font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:0.15s}
.pf-close:hover{background:var(--subtle);color:var(--t1)}

/* The rendered "app" inside the frame */
.pf-body{flex:1;overflow-y:auto;background:#fff}

/* ── App chrome inside preview ────────── */
.app-topbar{display:flex;align-items:center;padding:10px 20px;border-bottom:1px solid var(--border);background:var(--card)}
.app-logo{font-size:12px;font-weight:700;color:var(--green);margin-right:12px}
.app-nav{display:flex;gap:2px}
.app-nav-item{padding:4px 10px;border-radius:4px;font-size:10px;color:var(--t4);font-weight:500}
.app-nav-item.active{background:var(--green-pale);color:var(--green-dark);font-weight:600}
.app-topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.app-avatar{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:700;color:#fff}
.app-user{font-size:10px;color:var(--t4)}
.app-search{padding:4px 10px;border-radius:5px;border:1px solid var(--border);font-size:9px;color:var(--t4);background:var(--subtle);width:120px}

.app-content{padding:20px 24px}
.app-page-title{font-size:16px;font-weight:700;color:var(--t1);margin-bottom:4px}
.app-page-sub{font-size:11px;color:var(--t4);margin-bottom:16px}

/* KPI row */
.app-kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:16px}
.app-kpi{background:var(--subtle);border:1px solid var(--border);border-radius:8px;padding:12px 14px}
.app-kpi-val{font-size:22px;font-weight:800;line-height:1.1;margin-bottom:1px}
.app-kpi-val.green{color:var(--green)}.app-kpi-val.navy{color:var(--navy)}.app-kpi-val.amber{color:var(--amber)}
.app-kpi-label{font-size:8px;color:var(--t4);text-transform:uppercase;letter-spacing:0.04em;font-weight:500}
.app-kpi-delta{font-size:9px;margin-top:2px;font-weight:500}
.app-kpi-delta.up{color:var(--green)}.app-kpi-delta.down{color:#E53E3E}

/* Chart */
.app-chart{background:var(--subtle);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:12px}
.app-chart-title{font-size:10px;font-weight:600;color:var(--t3);margin-bottom:10px}
.app-chart-bars{display:flex;align-items:flex-end;gap:4px;height:80px}
.app-chart-bar{flex:1;border-radius:2px 2px 0 0;transition:height 0.5s ease}

/* Alert */
.app-alert{border-radius:8px;padding:10px 14px;display:flex;align-items:center;gap:10px;margin-bottom:12px}
.app-alert.warning{background:rgba(212,160,23,0.06);border:1px solid rgba(212,160,23,0.15)}
.app-alert.info{background:rgba(63,175,122,0.04);border:1px solid rgba(63,175,122,0.12)}
.app-alert-icon{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.app-alert.warning .app-alert-icon{background:var(--amber-pale);color:#8B6914}
.app-alert.info .app-alert-icon{background:var(--green-pale);color:var(--green-dark)}
.app-alert-body{flex:1}
.app-alert-title{font-size:11px;font-weight:600;color:var(--t1)}
.app-alert-desc{font-size:10px;color:var(--t3);line-height:1.4}
.app-alert-action{font-size:10px;font-weight:600;color:var(--green-dark);cursor:pointer;flex-shrink:0;padding:4px 10px;border-radius:5px;background:var(--green-pale)}

/* Table */
.app-table{width:100%;border-collapse:separate;border-spacing:0;border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:12px}
.app-table th{text-align:left;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:0.03em;color:var(--t4);padding:8px 12px;background:var(--subtle);border-bottom:1px solid var(--border)}
.app-table td{font-size:11px;color:var(--t2);padding:8px 12px;border-bottom:1px solid rgba(0,0,0,0.03);vertical-align:middle}
.app-table tr:last-child td{border-bottom:none}
.app-table tr:hover td{background:rgba(63,175,122,0.02)}
.app-table .badge{font-size:8px;font-weight:600;padding:2px 6px;border-radius:3px;text-transform:uppercase}
.app-table .badge.green{background:var(--green-pale);color:var(--green-dark)}
.app-table .badge.amber{background:var(--amber-pale);color:#8B6914}
.app-table .badge.gray{background:var(--subtle);color:var(--t4)}
.score-bar{width:50px;height:4px;background:var(--subtle);border-radius:2px;display:inline-block;vertical-align:middle;margin-left:5px;overflow:hidden}
.score-fill{height:100%;border-radius:2px;background:var(--green)}
.app-table .action-link{font-size:10px;color:var(--green-dark);font-weight:500;cursor:pointer}

/* Wizard */
.app-wizard-steps{display:flex;align-items:center;justify-content:center;gap:0;padding:0 20px 20px;margin-bottom:16px;border-bottom:1px solid var(--border)}
.app-wiz-step{display:flex;flex-direction:column;align-items:center;gap:4px}
.app-wiz-num{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.app-wiz-num.done{background:var(--green);color:#fff}
.app-wiz-num.current{background:var(--green);color:#fff;box-shadow:0 0 0 3px var(--green-glow)}
.app-wiz-num.pending{background:var(--subtle);color:var(--t5);border:2px solid var(--border)}
.app-wiz-label{font-size:9px;color:var(--t4);font-weight:500;white-space:nowrap}
.app-wiz-line{width:48px;height:2px;margin-top:-18px;z-index:-1}
.app-wiz-line.done{background:var(--green)}.app-wiz-line.pending{background:var(--border)}

.app-form{max-width:440px}
.app-form-group{margin-bottom:12px}
.app-form-label{font-size:10px;font-weight:500;color:var(--t3);margin-bottom:3px}
.app-form-input{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:11px;color:var(--t2);background:var(--card)}
.app-form-input.filled{background:var(--subtle);border-color:var(--border)}
.app-form-hint{font-size:9px;color:var(--t5);margin-top:2px}
.app-form-select{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:11px;color:var(--t2);background:var(--card);appearance:auto}
.app-form-row{display:flex;gap:10px}
.app-form-row .app-form-group{flex:1}
.app-btn{padding:8px 18px;border-radius:6px;border:none;font:600 11px 'Inter',sans-serif;cursor:pointer}
.app-btn.primary{background:var(--green);color:#fff}
.app-btn.secondary{background:var(--subtle);color:var(--t3);border:1px solid var(--border)}

/* Card grid */
.app-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px;margin-bottom:12px}
.app-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px;transition:all 0.2s}
.app-card:hover{border-color:var(--green);box-shadow:0 2px 10px rgba(63,175,122,0.08)}
.app-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.app-card-title{font-size:11px;font-weight:600;color:var(--t1);line-height:1.25}
.app-card-val{font-size:20px;font-weight:800;color:var(--t1);margin-bottom:2px}
.app-card-sub{font-size:9px;color:var(--t4);margin-bottom:6px}
.app-card-bar{height:3px;background:var(--subtle);border-radius:2px;overflow:hidden}
.app-card-bar-fill{height:100%;border-radius:2px}
.app-card-actions{display:flex;gap:4px;margin-top:8px}
.app-card-action{font-size:9px;font-weight:500;padding:3px 8px;border-radius:4px;cursor:pointer}
.app-card-action.approve{background:var(--green-pale);color:var(--green-dark)}
.app-card-action.flag{background:var(--amber-pale);color:#8B6914}

/* Report form */
.app-report-preview{background:var(--subtle);border:1px solid var(--border);border-radius:8px;padding:16px;margin-top:12px}
.app-report-preview h4{font-size:11px;font-weight:600;color:var(--t1);margin-bottom:8px}
.app-report-line{display:flex;justify-content:space-between;font-size:10px;padding:3px 0;border-bottom:1px solid rgba(0,0,0,0.03)}
.app-report-line:last-child{border-bottom:none}
.app-report-metric{color:var(--t3)}.app-report-value{color:var(--t1);font-weight:500}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.station{animation:fadeUp .4s ease backwards}
</style>
</head>

<div id="app">
  <header>
    <div class="header-row">

        <div class="pill"><span class="pill-val">6</span><span class="pill-lbl">Pains Solved</span></div>

<div class="preview-overlay" id="previewOverlay" onclick="if(event.target===this)closePreview()">

        <div class="pf-dots"><div class="pf-dot r"></div><div class="pf-dot y"></div><div class="pf-dot g"></div></div>

        </div>
        <div class="app-card">
          <div class="app-card-header"><div class="app-card-title">Hydraulic Valves</div><span class="badge amber">+8% Q4</span></div>
          <div class="app-card-val">85 units</div><div class="app-card-sub">Reorder in 18 days &middot; Slight seasonal uptick</div>
          <div class="app-card-bar"><div class="app-card-bar-fill" style="width:65%;background:var(--amber)"></div></div>
          <div class="app-card-actions"><span class="app-card-action approve">Approve</span><span class="app-card-action flag">Flag for Sarah</span></div>
        </div>
        <div class="app-card">
          <div class="app-card-header"><div class="app-card-title">Rubber Gasket Set</div><span class="badge green">Stable</span></div>
          <div class="app-card-val">560 units</div><div class="app-card-sub">Reorder in 30 days &middot; High stock</div>
          <div class="app-card-bar"><div class="app-card-bar-fill" style="width:88%;background:var(--green)"></div></div>
          <div class="app-card-actions"><span class="app-card-action approve">Approve</span></div>
        </div>
      </div>
      <div style="display:flex;gap:8px">
        <button class="app-btn primary">Approve All Recommended (28)</button>
        <button class="app-btn secondary">Generate POs</button>
      </div>
    `);
  }

  if (idx === 6) { // Report form
    return genAppChrome(s, s.actors[0], `
      <div class="app-page-title">Generate Report</div>
      <div class="app-page-sub">Audit-ready compliance and analytics exports</div>
      <div class="app-form" style="max-width:500px">
        <div class="app-form-row">
          <div class="app-form-group">
            <div class="app-form-label">Report type</div>
            <select class="app-form-select"><option>Q3 Compliance Report</option><option>Analytics Summary</option></select>

            ${['Classification Accuracy','Vendor Performance','Inventory Turns','Compliance Metrics','AI Learning Summary'].map(s => `<span class="badge green" style="font-size:9px;padding:3px 8px;cursor:pointer">${s}</span>`).join('')}

  if (idx === 7) { // Admin form

// ═══════════════════════════════════════════════════════════════
// RENDER CANVAS
// ═══════════════════════════════════════════════════════════════

function renderAll() {
  renderPersonas(); renderLanes();
  setTimeout(() => { document.getElementById('momFill').style.width='100%'; document.getElementById('momPct').textContent='100%'; }, 400);
}

function renderPersonas() {
  document.getElementById('personaPills').innerHTML = personas.map((p, i) =>
    `<button class="ppill${state.activePersona===i?' active':''}" style="--pc:${p.color}" onclick="togglePersona(${i})">
      <div class="pavatar" style="background:${p.color}">${p.initials}</div>${p.name.split(' ')[0]}</button>`
  ).join('');
}

function renderLanes() {
  const order = ['entry','core_experience','output','admin'];
  const lc={entry:'entry',core_experience:'core',output:'output',admin:'admin'};
  const ic={entry:'entry-idx',core_experience:'core-idx',output:'output-idx',admin:'admin-idx'};
  const ll={entry:'entry-l',core_experience:'core-l',output:'output-l',admin:'admin-l'};
  const ls={entry:'entry-s',core_experience:'core-s',output:'output-s',admin:'admin-s'};

  document.getElementById('phaseLanes').innerHTML = order.map(phase => {
    const p = PHASES[phase]; const isCore = phase==='core_experience';
    return `<div class="phase-lane ${lc[phase]}" style="flex:${isCore?1.8:1}">
      <div class="lane-header">
        <div class="lane-label ${ll[phase]}">${p.label}</div>
        <div class="lane-sublabel ${ls[phase]}">${p.sub}</div>
      </div>
      <div class="lane-cards">${p.steps.map(s => {
        const dots=s.actors.map(n=>{const pp=personas.find(x=>x.name===n);return pp?`<div class="pdot" style="background:${pp.color}">${pp.initials}</div>`:''}).join('');
        let tfHtml='';
        if(s.beforeAfter&&isCore) tfHtml=`<div class="st-transform"><span class="st-tf-before">${s.beforeAfter.before[0]}</span><span class="st-tf-arrow">→</span><span class="st-tf-after">${s.beforeAfter.after[0]}</span></div>`;
        const badges=[];
        if(s.ai_config) badges.push(`<span class="st-ai-badge">◈ AI</span>`);
        if(s.questions.length) badges.push(`<span class="st-q-badge">? ${s.questions.length}</span>`);
        return `<div class="station phase-${s.phase}" data-step="${s._idx}" onclick="openPanel(${s._idx})" style="animation-delay:${s._idx*0.06}s">
          <div class="st-top"><div class="st-idx ${ic[phase]}">${s._idx+1}</div><div class="st-title">${s.title}</div><div class="st-personas">${dots}</div></div>
          <div class="st-blurb">${s.blurb}</div>
          ${tfHtml}
          <div class="st-bottom">${badges.join('')}</div>
        </div>`;
      }).join('')}</div>
    </div>`;
  }).join('');
}

function togglePersona(i){
  state.activePersona=state.activePersona===i?null:i; renderPersonas();
  document.querySelectorAll('.station').forEach(el=>{
    const idx=parseInt(el.dataset.step);
    if(state.activePersona===null) el.classList.remove('dimmed');
    else el.classList.toggle('dimmed',!steps[idx].actors.includes(personas[state.activePersona].name));
  });
}

// ═══════════════════════════════════════════════════════════════
// DETAIL PANEL
// ═══════════════════════════════════════════════════════════════

function openPanel(idx){
  state.activeStep=idx; const s=steps[idx];
  const pc={entry:'var(--accent)',core_experience:'var(--green)',output:'var(--navy)',admin:'var(--t4)'};
  document.getElementById('dpHeader').innerHTML=`
    <div class="dp-icon" style="background:${pc[s.phase]}">${idx+1}</div>
    <div class="dp-meta"><div class="dp-title">${s.title}</div><div class="dp-goal">${s.goal}</div></div>
    <button class="dp-close" onclick="closePanel()">&times;</button>`;

  let c=`<button class="preview-btn" onclick="openPreview(${idx})"><span style="font-size:16px">◧</span> Preview this screen</button>`;
  c+=`<div class="dp-section"><div class="dp-label">The Story</div><div class="dp-narrative">${s.narrative}</div></div>`;
  if(s.beforeAfter) c+=`<div class="dp-section"><div class="dp-label">Transformation</div><div class="dp-ba">
    <div class="dp-ba-side before"><div class="dp-ba-lbl">Today</div>${s.beforeAfter.before.map(b=>`<div class="dp-ba-item">${b}</div>`).join('')}</div>
    <div class="dp-ba-side after"><div class="dp-ba-lbl">Tomorrow</div>${s.beforeAfter.after.map(a=>`<div class="dp-ba-item">${a}</div>`).join('')}</div></div></div>`;
  c+=`<div class="dp-section"><div class="dp-label">Information Fields (${s.fields.length})</div><div class="dp-fields">${s.fields.map(f=>
    `<div class="dp-field"><span class="dp-field-dot ${f.conf}"></span><span class="dp-field-name">${f.name}</span><span class="dp-field-val">${f.val}</span></div>`).join('')}</div></div>`;
  if(s.ai_config) c+=`<div class="dp-section"><div class="dp-label">AI Capabilities</div><div class="dp-ai"><div class="dp-ai-role">${s.ai_config.role}</div>${s.ai_config.behaviors.map(b=>`<div class="dp-ai-beh">${b}</div>`).join('')}</div></div>`;
  if(s.questions.length) c+=`<div class="dp-section"><div class="dp-label">Open Questions (${s.questions.length})</div>${s.questions.map(q=>`<div class="dp-question"><div class="dp-q-icon">?</div><div><div class="dp-q-text">${q.q}</div>${q.ctx?`<div class="dp-q-ctx">${q.ctx}</div>`:''}</div></div>`).join('')}</div>`;

  document.getElementById('dpContent').innerHTML=c;
  document.getElementById('panelBackdrop').classList.add('open');
  document.getElementById('detailPanel').classList.add('open');
  document.querySelectorAll('.station').forEach(el=>el.classList.toggle('selected',parseInt(el.dataset.step)===idx));
}

function closePanel(){
  state.activeStep=null;
  document.getElementById('panelBackdrop').classList.remove('open');
  document.getElementById('detailPanel').classList.remove('open');
  document.querySelectorAll('.station').forEach(el=>el.classList.remove('selected'));
}

// ═══════════════════════════════════════════════════════════════
// PREVIEW MODAL
// ═══════════════════════════════════════════════════════════════

function openPreview(idx){
  const s=steps[idx];
  document.getElementById('pfTitle').textContent=s.title;
  document.getElementById('pfBody').innerHTML=genPreview(idx);
  document.getElementById('previewOverlay').classList.add('open');
  // Animate chart bars
  setTimeout(()=>{document.querySelectorAll('.app-chart-bar').forEach(b=>{const h=b.style.height;b.style.height='0';setTimeout(()=>b.style.height=h,50)})},100);
}
function closePreview(){document.getElementById('previewOverlay').classList.remove('open')}

document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    if(document.getElementById('previewOverlay').classList.contains('open')) closePreview();
    else closePanel();
  }
});

renderAll();
</script>
