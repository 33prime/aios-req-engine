<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BenyBox — UX Inventory</title>
<style>
:root {
  --navy: #0A1E2F; --green: #3FAF7A; --green-dark: #2A8F5F; --green-pale: rgba(63,175,122,0.08);
  --teal: #044159; --teal-pale: rgba(4,65,89,0.06);
  --gold: #C49A1A; --gold-pale: rgba(196,154,26,0.08);
  --red: #D94F4F; --red-pale: rgba(217,79,79,0.08);
  --t1: #1D1D1F; --t2: #333; --t3: #4A5568; --t4: #718096; --t5: #A0AEC0;
  --bg: #F7F8FA; --card: #FFF; --border: #E2E8F0; --subtle: #EDF2F7;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Inter',system-ui,sans-serif;background:var(--bg);color:var(--t2);-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#CBD5E0;border-radius:3px}

/* Header */
.hdr{background:var(--navy);padding:20px 32px 16px;position:sticky;top:0;z-index:100}
.hdr-top{display:flex;align-items:center;gap:16px;margin-bottom:10px}
.hdr-logo{font-size:11px;font-weight:800;color:var(--green);letter-spacing:.02em}
.hdr-title{font-size:18px;font-weight:700;color:#fff;flex:1}
.hdr-thesis{font-size:11px;color:rgba(255,255,255,0.5);font-style:italic;max-width:600px;line-height:1.5}
.hdr-stats{display:flex;gap:16px;margin-top:8px}
.stat{display:flex;flex-direction:column;align-items:center;padding:4px 14px;border-radius:6px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06)}
.stat-val{font-size:16px;font-weight:700;color:var(--green)}
.stat-lbl{font-size:7px;text-transform:uppercase;letter-spacing:.05em;color:rgba(255,255,255,0.3);font-weight:600}

/* Persona filter pills */
.persona-bar{display:flex;gap:6px;margin-top:10px;align-items:center}
.persona-label{font-size:9px;color:rgba(255,255,255,0.3);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-right:4px}
.ppill{display:flex;align-items:center;gap:4px;padding:3px 10px 3px 3px;border-radius:14px;border:1px solid rgba(255,255,255,0.08);cursor:pointer;background:0;color:rgba(255,255,255,0.4);font:500 10px inherit;transition:all .15s}
.ppill:hover{color:rgba(255,255,255,0.7);border-color:rgba(255,255,255,0.15)}
.ppill.on{background:rgba(255,255,255,0.08);border-color:var(--pc,rgba(255,255,255,0.2));color:#fff}
.ppill .dot{width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:700;color:#fff}
.ppill-clear{font-size:9px;color:rgba(255,255,255,0.3);cursor:pointer;margin-left:8px;text-decoration:underline}
.ppill-clear:hover{color:rgba(255,255,255,0.6)}

/* Tabs */
.tabs{display:flex;gap:2px;background:var(--card);border-bottom:1px solid var(--border);padding:0 32px;position:sticky;top:90px;z-index:90}
.tab{padding:10px 18px;font-size:11px;font-weight:600;color:var(--t4);cursor:pointer;border:none;background:none;font-family:inherit;position:relative;transition:color .15s}
.tab:hover{color:var(--t2)}
.tab.on{color:var(--green-dark)}
.tab.on::after{content:'';position:absolute;bottom:0;left:12px;right:12px;height:2px;background:var(--green);border-radius:1px 1px 0 0}
.tab .tbadge{font-size:9px;font-weight:700;padding:1px 6px;border-radius:8px;margin-left:4px}
.tab.on .tbadge{background:var(--green-pale);color:var(--green-dark)}
.tab:not(.on) .tbadge{background:var(--subtle);color:var(--t5)}

/* Main */
.main{max-width:1200px;margin:0 auto;padding:24px 32px 80px}
.section-hdr{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--t5);margin:28px 0 12px;display:flex;align-items:center;gap:8px}
.section-hdr .line{flex:1;height:1px;background:var(--border)}
.hidden{display:none}

/* ── Outcome Cards ── */
.outcome-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px;margin-bottom:24px}
.oc{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.oc:hover{border-color:rgba(63,175,122,0.3);box-shadow:0 2px 12px rgba(0,0,0,0.04)}
.oc.on{border-color:var(--green);box-shadow:0 0 0 2px var(--green-pale)}
.oc-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.oc-ring{position:relative;width:36px;height:36px;flex-shrink:0}
.oc-ring svg{transform:rotate(-90deg)}
.oc-ring .rbg{stroke:var(--subtle);stroke-width:3;fill:none}
.oc-ring .rfg{stroke-width:3;fill:none;stroke-linecap:round}
.oc-ring-val{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--t2)}
.oc-badges{display:flex;gap:4px}
.badge{font-size:8px;font-weight:600;padding:2px 7px;border-radius:4px}
.badge-h1{background:var(--green-pale);color:var(--green-dark)}
.badge-h2{background:var(--teal-pale);color:var(--teal)}
.oc-title{font-size:12px;font-weight:600;color:var(--t1);line-height:1.4;margin-bottom:6px}
.oc-actors{display:flex;gap:3px;flex-wrap:wrap}
.oc-actor{font-size:8px;font-weight:500;padding:2px 6px;border-radius:3px;background:var(--subtle);color:var(--t3)}
.oc-tension{position:absolute;top:8px;right:8px;font-size:8px;font-weight:700;color:var(--gold);background:var(--gold-pale);padding:1px 5px;border-radius:3px}

/* ── Screen Cards ── */
.tier-label{font-size:11px;font-weight:700;color:var(--navy);margin:20px 0 8px;display:flex;align-items:center;gap:8px}
.tier-label .tdesc{font-weight:400;color:var(--t4);font-size:10px}
.screen-grid{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.sc{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;transition:all .2s}
.sc:hover{border-color:rgba(0,0,0,0.12);box-shadow:0 2px 8px rgba(0,0,0,0.04)}
.sc.dimmed{opacity:0.12;pointer-events:none}
.sc.highlighted{border-color:var(--green);border-left:4px solid var(--green)}
.sc-hdr{padding:12px 16px;cursor:pointer;display:flex;align-items:flex-start;gap:12px}
.sc-idx{min-width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.sc-idx.entry{background:var(--teal-pale);color:var(--teal)}
.sc-idx.core{background:var(--green-pale);color:var(--green-dark)}
.sc-idx.output{background:rgba(10,30,47,0.06);color:var(--navy)}
.sc-idx.admin{background:var(--subtle);color:var(--t4)}
.sc-main{flex:1;min-width:0}
.sc-title{font-size:13px;font-weight:600;color:var(--t1);line-height:1.3}
.sc-meta{display:flex;gap:6px;margin-top:4px;flex-wrap:wrap;align-items:center}
.sc-pattern{font-size:8px;font-weight:600;padding:2px 6px;border-radius:3px;background:var(--subtle);color:var(--t4);text-transform:uppercase;letter-spacing:.03em}
.sc-ai{font-size:8px;font-weight:600;padding:2px 6px;border-radius:3px;background:var(--teal-pale);color:var(--teal)}
.sc-convergence{font-size:8px;font-weight:700;padding:2px 6px;border-radius:3px;background:var(--green-pale);color:var(--green-dark)}
.sc-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.sc-outcomes{display:flex;gap:2px}
.sc-odot{width:8px;height:8px;border-radius:50%}
.sc-personas{display:flex;gap:0}
.sc-pavatar{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:6px;font-weight:700;color:#fff;border:2px solid var(--card);margin-left:-4px}
.sc-pavatar:first-child{margin-left:0}
.sc-chev{color:var(--t5);font-size:12px;transition:transform .2s;margin-top:4px}
.sc.open .sc-chev{transform:rotate(180deg)}

/* Expanded */
.sc-body{display:none;border-top:1px solid var(--border)}
.sc.open .sc-body{display:block}
.sc-cols{display:grid;grid-template-columns:1fr 1fr;gap:0}
.sc-col{padding:14px 16px}
.sc-col:first-child{border-right:1px solid var(--border)}
.sc-col-label{font-size:7px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--t5);margin-bottom:8px}
.sc-moment{font-size:11px;color:var(--t2);line-height:1.6;font-style:italic;padding:8px 10px;background:var(--subtle);border-radius:6px;border-left:3px solid var(--green);margin-bottom:10px}
.sc-behavior{font-size:10px;color:var(--t3);line-height:1.5;padding:2px 0}
.sc-behavior::before{content:'';display:inline-block;width:4px;height:4px;border-radius:50%;background:var(--teal);margin-right:6px;vertical-align:middle}
.sc-intel-row{display:flex;align-items:center;gap:6px;padding:4px 0;font-size:10px}
.sc-intel-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.sc-intel-dot.has{background:var(--green)}.sc-intel-dot.gap{background:var(--red-pale);border:1px solid var(--red)}
.sc-intel-q{font-weight:600;color:var(--t4);width:70px;text-transform:capitalize}
.sc-intel-name{color:var(--t2)}
.sc-vocab{margin-top:8px}
.sc-vocab-use{font-size:9px;color:var(--green-dark);font-weight:500}
.sc-vocab-not{font-size:9px;color:var(--red);font-weight:500;margin-top:2px}
.sc-connections{display:flex;gap:4px;flex-wrap:wrap;margin-top:8px}
.sc-conn{font-size:8px;font-weight:500;padding:2px 7px;border-radius:4px;background:rgba(0,0,0,0.03);color:var(--t3)}
.sc-outcome-detail{padding:6px 8px;border-radius:6px;margin-bottom:6px;border-left:3px solid}
.sc-outcome-title{font-size:10px;font-weight:600;color:var(--t1);margin-bottom:2px}
.sc-outcome-how{font-size:9px;color:var(--t3);line-height:1.4}

/* ── Intelligence Grid ── */
.intel-grid{display:grid;grid-template-columns:auto repeat(4,1fr);gap:1px;background:var(--border);border-radius:8px;overflow:hidden;margin-bottom:24px}
.ig-cell{background:var(--card);padding:8px 10px;font-size:10px}
.ig-hdr{font-weight:700;color:var(--t4);text-transform:uppercase;letter-spacing:.04em;font-size:8px;text-align:center}
.ig-outcome{font-weight:600;color:var(--t1);font-size:9px;line-height:1.3}
.ig-item{text-align:center}
.ig-item.has{background:rgba(63,175,122,0.04)}
.ig-item.gap{background:var(--red-pale)}
.ig-name{font-size:8px;font-weight:500;color:var(--t3)}

/* ── Tension Map ── */
.tension-list{display:flex;flex-direction:column;gap:8px;margin-bottom:24px}
.tension{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px 16px;display:flex;align-items:center;gap:12px}
.tension-sides{display:flex;align-items:center;gap:8px;flex:1}
.tension-side{font-size:10px;font-weight:600;padding:4px 10px;border-radius:5px}
.tension-side.a{background:var(--green-pale);color:var(--green-dark)}
.tension-side.b{background:var(--teal-pale);color:var(--teal)}
.tension-arrow{font-size:14px;color:var(--gold)}
.tension-resolution{font-size:9px;color:var(--t3);flex:1}
.tension-surface{font-size:9px;font-weight:600;color:var(--navy);background:var(--subtle);padding:3px 8px;border-radius:4px;white-space:nowrap}

@media(max-width:800px){.sc-cols{grid-template-columns:1fr}.sc-col:first-child{border-right:none;border-bottom:1px solid var(--border)}.outcome-row{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-top">
    <div class="hdr-logo">AIOS</div>
    <div class="hdr-title">BenyBox — UX Inventory</div>
    <div class="hdr-thesis">Families don't get screwed with legal and financial work when a loved one passes</div>
  </div>
  <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">
    <div class="hdr-stats" id="stats"></div>
    <div class="persona-bar">

      <div id="personaPills"></div>
      <span class="ppill-clear" id="clearFilter" style="display:none" onclick="clearPersona()">Clear</span>
    </div>
  </div>
</div>

<div class="tabs" id="tabs"></div>

<div class="main" id="main"></div>

function render() {
  renderStats();

  renderTabs();
  renderMain();
}

function renderStats() {
  const convergenceCount = SCREENS.filter(s=>(s.convergence||0)>=2).length;
  document.getElementById('stats').innerHTML = `
    <div class="stat"><span class="stat-val">${OUTCOMES.length}</span><span class="stat-lbl">Outcomes</span></div>

    <div class="stat"><span class="stat-val">${TENSIONS.length}</span><span class="stat-lbl">Tensions</span></div>
  `;
}

function renderPersonaPills() {
  document.getElementById('personaPills').innerHTML = PERSONAS.map(p=>`
    <button class="ppill ${activePersona===p.id?'on':''}" style="${activePersona===p.id?`--pc:${p.c}`:''}" onclick="togglePersona('${p.id}')">
      <span class="dot" style="background:${p.c}">${p.i}</span>${p.name}
    </button>
  `).join('');
  document.getElementById('clearFilter').style.display = activePersona ? '' : 'none';
}

function renderTabs() {
  const tabs = [
    {id:'screens',label:'Screen Inventory',count:SCREENS.length},
    {id:'outcomes',label:'Outcomes',count:OUTCOMES.length},
    {id:'intelligence',label:'Intelligence Grid',count:37},
    {id:'tensions',label:'Tensions',count:TENSIONS.length},
  ];
  document.getElementById('tabs').innerHTML = tabs.map(t=>`
    <button class="tab ${activeTab===t.id?'on':''}" onclick="switchTab('${t.id}')">${t.label}<span class="tbadge">${t.count}</span></button>
  `).join('');
}

function renderMain() {
  const el = document.getElementById('main');
  if (activeTab==='screens') el.innerHTML = renderScreensTab();
  else if (activeTab==='outcomes') el.innerHTML = renderOutcomesTab();
  else if (activeTab==='intelligence') el.innerHTML = renderIntelligenceTab();
  else if (activeTab==='tensions') el.innerHTML = renderTensionsTab();
}

// ── Screens Tab ──

function renderScreensTab() {
  const tiers = [
    {label:'Tier 1: Convergence Screens',desc:'Demo FIRST — these prove understanding',screens:SCREENS.filter(s=>(s.convergence||0)>=2&&s.outcomes.length>=2&&![8].includes(s.idx))},
    {label:'Tier 2: Selling Screens',desc:'Demo SECOND — emotional hook',screens:SCREENS.filter(s=>s.selling||[8,9].includes(s.idx))},
    {label:'Tier 3: Foundation',desc:'Demo THIRD — establish context',screens:SCREENS.filter(s=>[0,1,2,4,6,7].includes(s.idx))},
    {label:'Tier 4: B2B / H2',desc:'Demo LAST — business model',screens:SCREENS.filter(s=>[12,13,14,15,11].includes(s.idx))},
  ];

  // Deduplicate screens across tiers
  const seen = new Set();
  const deduped = tiers.map(t => {
    const unique = t.screens.filter(s => { if(seen.has(s.idx)) return false; seen.add(s.idx); return true; });
    return {...t, screens: unique};
  }).filter(t => t.screens.length > 0);

  return deduped.map(tier=>`
    <div class="tier-label">${tier.label} <span class="tdesc">${tier.desc}</span></div>
    <div class="screen-grid">${tier.screens.map(s=>renderScreenCard(s)).join('')}</div>
  `).join('');
}

function renderScreenCard(s) {
  const isOpen = openScreens.has(s.idx);
  const journey = activePersona ? PERSONA_JOURNEYS[activePersona] : null;
  const highlighted = journey && journey.includes(s.idx);
  const dimmed = journey && !highlighted;
  const outcomeFiltered = activeOutcome && !s.outcomes.includes(activeOutcome);

  const phaseClass = s.phase==='entry'?'entry':s.phase==='core_experience'?'core':s.phase==='output'?'output':'admin';
  const outcomeDots = s.outcomes.map(oid=>`<div class="sc-odot" style="background:${OC_COLORS[oid]}" title="${OUTCOMES.find(o=>o.id===oid)?.title.slice(0,40)}"></div>`).join('');
  const personaDots = s.personas.map(pid=>{
    const p=PERSONAS.find(pp=>pp.id===pid);
    return p?`<div class="sc-pavatar" style="background:${p.c}" title="${p.full}">${p.i}</div>`:'';
  }).join('');

  let badges = `<span class="sc-pattern">${s.pattern}</span>`;
  if (s.ai?.name) badges += `<span class="sc-ai">${s.ai.name}</span>`;
  if ((s.convergence||0)>=2) badges += `<span class="sc-convergence">${s.convergence} outcomes converge</span>`;
  if (s.selling) badges += `<span class="sc-convergence" style="background:var(--gold-pale);color:var(--gold)">Selling Moment</span>`;
  if (s.tensionResolution) badges += `<span class="sc-convergence" style="background:var(--teal-pale);color:var(--teal)">Tension Resolution</span>`;

  let body = '';
  if (isOpen) {
    const outcomeDetails = s.outcomes.map(oid=>{
      const o = OUTCOMES.find(oo=>oo.id===oid);
      if(!o) return '';
      const how = ''; // could pull from data
      return `<div class="sc-outcome-detail" style="border-color:${OC_COLORS[oid]};background:${OC_COLORS[oid]}08">
        <div class="sc-outcome-title" style="color:${OC_COLORS[oid]}">${o.title.slice(0,70)}</div>
      </div>`;
    }).join('');

    const intelRows = ['knowledge','scoring','decision','ai'].map(q=>{
      const val = s.intel?.[q] || 'n/a';
      const has = val && val !== 'n/a';
      return `<div class="sc-intel-row">
        <div class="sc-intel-dot ${has?'has':'gap'}"></div>
        <div class="sc-intel-q">${q}</div>
        <div class="sc-intel-name">${val}</div>
      </div>`;
    }).join('');

    const behaviors = (s.behavior||[]).map(b=>`<div class="sc-behavior">${b}</div>`).join('');
    const connections = [...(s.connections?.from||[]).map(i=>`<span class="sc-conn">← ${SCREENS.find(ss=>ss.idx===i)?.title.slice(0,25)}</span>`),...(s.connections?.to||[]).map(i=>`<span class="sc-conn">→ ${SCREENS.find(ss=>ss.idx===i)?.title.slice(0,25)}</span>`)].join('');

    body = `<div class="sc-body">
      <div class="sc-cols">
        <div class="sc-col">
          <div class="sc-col-label">The Moment</div>
          <div class="sc-moment">${s.moment}</div>
          <div class="sc-col-label">Outcomes Served</div>
          ${outcomeDetails}
          ${s.vocab?`<div class="sc-vocab">
            <div class="sc-vocab-use">Use: ${s.vocab.use.join(', ')}</div>
            <div class="sc-vocab-not">Avoid: ${s.vocab.not.join(', ')}</div>
          </div>`:''}
        </div>
        <div class="sc-col">
          <div class="sc-col-label">Invisible Behavior</div>
          ${behaviors}
          <div class="sc-col-label" style="margin-top:12px">Intelligence Requirements</div>
          ${intelRows}
          ${connections?`<div class="sc-col-label" style="margin-top:12px">Connected Screens</div><div class="sc-connections">${connections}</div>`:''}
        </div>
      </div>
    </div>`;
  }

  return `<div class="sc ${isOpen?'open':''} ${dimmed?'dimmed':''} ${highlighted?'highlighted':''} ${outcomeFiltered?'dimmed':''}">
    <div class="sc-hdr" onclick="toggleScreen(${s.idx})">
      <div class="sc-idx ${phaseClass}">${s.idx}</div>
      <div class="sc-main">
        <div class="sc-title">${s.title}</div>
        <div class="sc-meta">${badges}</div>
      </div>
      <div class="sc-right">
        <div class="sc-outcomes">${outcomeDots}</div>
        <div class="sc-personas">${personaDots}</div>
        <div class="sc-chev">▾</div>
      </div>
    </div>
    ${body}
  </div>`;
}

function renderOutcomeCard(o) {
  const circ = 2*Math.PI*14;
  const offset = circ - (o.strength/100)*circ;
  const color = o.strength>=90?'var(--green)':o.strength>=70?'var(--green-dark)':'var(--gold)';
  const isOn = activeOutcome===o.id;

  return `<div class="oc ${isOn?'on':''}" onclick="toggleOutcome('${o.id}')">
    ${o.tension?`<div class="oc-tension">↔ O${OUTCOMES.find(oo=>oo.id===o.tension)?.n}</div>`:''}
    <div class="oc-top">
      <div class="oc-ring">
        <svg width="36" height="36" viewBox="0 0 36 36"><circle class="rbg" cx="18" cy="18" r="14"/><circle class="rfg" cx="18" cy="18" r="14" style="stroke:${color};stroke-dasharray:${circ};stroke-dashoffset:${offset}"/></svg>
        <span class="oc-ring-val">${o.strength}</span>
      </div>
      <div class="oc-badges"><span class="badge badge-${o.horizon}">${o.horizon.toUpperCase()}</span></div>
    </div>
    <div class="oc-title">${o.title}</div>
    <div class="oc-actors">${o.personas.map(pid=>{
      const p=PERSONAS.find(pp=>pp.id===pid);
      return p?`<span class="oc-actor" style="border-left:2px solid ${p.c}">${p.name}</span>`:'';
    }).join('')}</div>
  </div>`;
}

    <div style="display:flex;gap:12px;margin-top:16px">
      <div style="display:flex;align-items:center;gap:4px;font-size:9px;color:var(--t4)"><div style="width:10px;height:10px;background:rgba(63,175,122,0.1);border-radius:2px"></div> Covered</div>
      <div style="display:flex;align-items:center;gap:4px;font-size:9px;color:var(--t4)"><div style="width:10px;height:10px;background:var(--red-pale);border:1px solid var(--red);border-radius:2px"></div> Gap</div>
    </div>
  `;
}

// ── Tensions Tab ──

function renderTensionsTab() {
  return `
    <div style="margin-bottom:12px;font-size:12px;color:var(--t3)">Tensions are natural conflicts between outcomes. Each has a resolution surface where the prototype must demonstrate balance.</div>
    <div class="tension-list">
      ${TENSIONS.map(t=>`
        <div class="tension">
          <div class="tension-sides">
            <span class="tension-side a">${t.a}</span>
            <span class="tension-arrow">↔</span>
            <span class="tension-side b">${t.b}</span>
          </div>
          <div class="tension-resolution">${t.implication}</div>
          <div class="tension-surface">${t.resolution}</div>
        </div>
      `).join('')}
    </div>
  `;
}

// ═══════════════════════════════════════════════════════════
// INTERACTIONS
// ═══════════════════════════════════════════════════════════

function switchTab(id) { activeTab=id; render(); }
function togglePersona(id) { activePersona = activePersona===id ? null : id; activeOutcome=null; render(); }
function clearPersona() { activePersona=null; render(); }
function toggleOutcome(id) { activeOutcome = activeOutcome===id ? null : id; activePersona=null; render(); }
function toggleScreen(idx) { openScreens.has(idx) ? openScreens.delete(idx) : openScreens.add(idx); renderMain(); }

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════

render();
</script>
</body>
</html>
