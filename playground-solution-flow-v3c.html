<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Solution Flow v3c — Preview Render</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --green: #3FAF7A; --green-dark: #2A8F5F; --green-pale: rgba(63,175,122,0.08); --green-glow: rgba(63,175,122,0.18);
  --accent: #044159; --accent-pale: rgba(4,65,89,0.05);
  --navy: #0A1E2F;
  --amber: #D4A017; --amber-pale: rgba(212,160,23,0.08);
  --t1: #0A1E2F; --t2: #2D3748; --t3: #4A5568; --t4: #718096; --t5: #A0AEC0;
  --border: #E2E8F0; --bg: #F7FAFC; --card: #FFF; --subtle: #EDF2F7;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--t2);overflow:hidden;height:100vh}
::-webkit-scrollbar{height:5px;width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#CBD5E0;border-radius:3px}
#app{display:flex;flex-direction:column;height:100vh}

/* ── Header ───────────────────────────── */
header{background:var(--navy);padding:14px 32px 12px;flex-shrink:0}
.header-row{display:flex;align-items:center;gap:20px;margin-bottom:8px}
.thesis{font-size:14px;color:rgba(255,255,255,0.82);line-height:1.55;flex:1;max-width:660px}
.thesis em{color:var(--green);font-style:normal;font-weight:600}
.pills{display:flex;gap:10px;flex-shrink:0}
.pill{display:flex;flex-direction:column;align-items:center;padding:4px 13px;border-radius:7px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07)}
.pill-val{font-size:16px;font-weight:700;color:var(--green);line-height:1.2}
.pill-lbl{font-size:8px;color:rgba(255,255,255,0.32);text-transform:uppercase;letter-spacing:0.04em;font-weight:500}
.controls{display:flex;align-items:center;gap:8px}
.persona-pills{display:flex;gap:4px;flex:1}
.ppill{display:flex;align-items:center;gap:4px;padding:2px 9px 2px 2px;border-radius:14px;border:1px solid rgba(255,255,255,0.08);cursor:pointer;transition:all .2s;background:0;color:rgba(255,255,255,0.4);font:500 10px 'Inter',sans-serif}
.ppill:hover{color:rgba(255,255,255,0.75);border-color:rgba(255,255,255,0.18)}
.ppill.active{background:rgba(255,255,255,0.08);border-color:var(--pc);color:#fff}
.pavatar{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:700;color:#fff;flex-shrink:0}
.present-btn{padding:4px 14px;border-radius:7px;border:1px solid rgba(63,175,122,0.3);background:rgba(63,175,122,0.06);color:var(--green);font:600 10px 'Inter',sans-serif;cursor:pointer;transition:all .2s}
.present-btn:hover{background:rgba(63,175,122,0.15);border-color:var(--green)}

/* ── Canvas ───────────────────────────── */
.main{flex:1;overflow:auto;position:relative}
.canvas{position:relative;min-height:100%;display:flex;flex-direction:column}
.phase-lanes{display:flex;flex:1;min-height:480px;position:relative}
.phase-lane{flex:1;min-width:0;display:flex;flex-direction:column;padding:0 12px;position:relative}
.phase-lane::before{content:'';position:absolute;inset:0;pointer-events:none;z-index:0}
.phase-lane.core::before{background:linear-gradient(180deg, rgba(63,175,122,0.02) 0%, rgba(63,175,122,0.055) 100%)}
.phase-lane.entry::before{background:rgba(4,65,89,0.012)}
.phase-lane.output::before{background:rgba(10,30,47,0.012)}
.phase-lane.admin::before{background:rgba(0,0,0,0.008)}

.lane-header{padding:16px 8px 10px;position:relative;z-index:1;flex-shrink:0}
.lane-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:2px}
.lane-sublabel{font-size:10px;color:var(--t4);line-height:1.3}
.lane-label.entry-l{color:var(--accent)}
.lane-label.core-l{color:var(--green-dark)}
.lane-label.output-l{color:var(--navy)}
.lane-label.admin-l{color:var(--t4)}
.lane-cards{flex:1;display:flex;flex-direction:column;gap:10px;padding:4px 0 16px;position:relative;z-index:1;justify-content:center}

/* ── Station Cards ────────────────────── */
.station{
  background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:12px 14px;cursor:pointer;transition:all .3s cubic-bezier(.4,0,.2,1);
  position:relative;overflow:hidden;
}
.station:hover{border-color:var(--green);box-shadow:0 4px 16px rgba(63,175,122,0.10);transform:translateY(-1px)}
.station.selected{border-color:var(--green);box-shadow:0 0 0 2px var(--green-glow)}
.station.dimmed{opacity:.18;pointer-events:none}

/* Core value — bigger, green accent */
.station.core-value{
  border-color:rgba(63,175,122,0.18);
  background:linear-gradient(135deg, #fff 0%, rgba(63,175,122,0.015) 100%);
  padding:16px 18px;
}
.station.core-value:hover{border-color:var(--green);box-shadow:0 6px 24px rgba(63,175,122,0.14)}

.station.compact .st-goal{display:none}

.st-top{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.st-idx{width:20px;height:20px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0}
.st-idx.entry-idx{background:var(--accent-pale);color:var(--accent)}
.st-idx.core-idx{background:var(--green-pale);color:var(--green-dark)}
.st-idx.output-idx{background:rgba(10,30,47,0.06);color:var(--navy)}
.st-idx.admin-idx{background:rgba(0,0,0,0.04);color:var(--t4)}
.st-title{font-size:12px;font-weight:600;color:var(--t1);line-height:1.3;flex:1}
.station.core-value .st-title{font-size:14px;font-weight:700}
.st-personas{display:flex;margin-left:auto;flex-shrink:0}
.pdot{width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:6px;font-weight:700;color:#fff;border:2px solid var(--card);margin-left:-3px}
.pdot:first-child{margin-left:0}

.st-goal{font-size:10px;color:var(--t4);line-height:1.4;margin-bottom:6px}
.station.core-value .st-goal{font-size:11px;margin-bottom:8px;-webkit-line-clamp:3}

/* Transformation on core cards */
.st-transform{display:flex;gap:6px;align-items:center;padding:6px 10px;border-radius:6px;background:rgba(63,175,122,0.04);margin-bottom:8px}
.st-tf-before{font-size:10px;color:var(--t4);text-decoration:line-through;text-decoration-color:rgba(0,0,0,0.2)}
.st-tf-arrow{font-size:11px;color:var(--green);font-weight:600}
.st-tf-after{font-size:10px;color:var(--green-dark);font-weight:600}

/* AI badge */
.st-ai-badge{display:inline-flex;align-items:center;gap:3px;font-size:8px;font-weight:600;color:var(--accent);padding:2px 7px;border-radius:3px;background:rgba(4,65,89,0.05)}

/* Questions badge */
.st-q-badge{display:inline-flex;align-items:center;gap:3px;font-size:8px;font-weight:600;color:#8B6914;padding:2px 7px;border-radius:3px;background:var(--amber-pale);margin-left:4px}

.st-bottom{display:flex;align-items:center;gap:4px;margin-top:6px;flex-wrap:wrap}

/* ── Momentum strip ───────────────────── */
.momentum-strip{height:36px;background:var(--card);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 32px;gap:12px;flex-shrink:0}
.mom-label{font-size:8px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:var(--t5);white-space:nowrap}
.mom-track{flex:1;height:4px;background:var(--subtle);border-radius:2px;overflow:hidden}
.mom-fill{height:100%;border-radius:2px;background:linear-gradient(90deg, var(--accent) 0%, var(--green) 100%);transition:width 0.8s ease}
.mom-pct{font-size:11px;font-weight:700;color:var(--green)}

/* ── Detail Panel (slide-in right) ────── */
.panel-backdrop{display:none;position:fixed;inset:0;z-index:180;background:rgba(10,30,47,0.10)}
.panel-backdrop.open{display:block}
.detail-panel{
  position:fixed;right:-540px;top:0;bottom:0;z-index:200;width:480px;max-width:90vw;
  background:var(--card);box-shadow:-6px 0 32px rgba(10,30,47,0.10);
  display:flex;flex-direction:column;transition:right 0.3s cubic-bezier(.4,0,.2,1);
}
.detail-panel.open{right:0}

.dp-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:12px;flex-shrink:0}
.dp-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0}
.dp-meta{flex:1;min-width:0}
.dp-title{font-size:15px;font-weight:700;color:var(--t1);line-height:1.25}
.dp-goal{font-size:12px;color:var(--t4);line-height:1.4;margin-top:2px}
.dp-close{width:28px;height:28px;border-radius:50%;border:1px solid var(--border);background:var(--subtle);color:var(--t4);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:0.15s}
.dp-close:hover{background:var(--border);color:var(--t1)}

.dp-content{flex:1;overflow-y:auto;padding:16px 20px}
.dp-section{margin-bottom:14px}
.dp-label{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:var(--t5);margin-bottom:5px}
.dp-narrative{font-size:12px;line-height:1.65;color:var(--t2);padding:12px 14px;background:var(--subtle);border-radius:8px;border-left:3px solid var(--green)}
.dp-ba{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.dp-ba-side{padding:10px 12px;border-radius:7px}
.dp-ba-side.before{background:rgba(4,65,89,0.03);border:1px solid rgba(4,65,89,0.08)}
.dp-ba-side.after{background:rgba(63,175,122,0.03);border:1px solid rgba(63,175,122,0.08)}
.dp-ba-lbl{font-size:8px;font-weight:600;text-transform:uppercase;letter-spacing:0.04em;margin-bottom:5px}
.dp-ba-side.before .dp-ba-lbl{color:var(--accent)}
.dp-ba-side.after .dp-ba-lbl{color:var(--green-dark)}
.dp-ba-item{font-size:10px;color:var(--t3);padding:2px 0;line-height:1.4}
.dp-ai{padding:10px 12px;border-radius:7px;background:rgba(4,65,89,0.03);border:1px solid rgba(4,65,89,0.08)}
.dp-ai-role{font-size:11px;color:var(--t2);font-weight:500;margin-bottom:4px}
.dp-ai-behavior{font-size:10px;color:var(--t3);padding:1px 0;line-height:1.4}
.dp-ai-behavior::before{content:'';display:inline-block;width:4px;height:4px;border-radius:50%;background:var(--accent);margin-right:6px;vertical-align:middle}
.dp-question{padding:8px 10px;border-radius:6px;background:var(--subtle);margin-bottom:6px;display:flex;gap:8px}
.dp-q-icon{width:18px;height:18px;border-radius:50%;background:var(--amber-pale);color:#8B6914;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0}
.dp-q-text{font-size:11px;color:var(--t2);line-height:1.4}
.dp-q-ctx{font-size:10px;color:var(--t4);margin-top:2px}
.dp-field-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.dp-field{display:flex;align-items:center;gap:5px;font-size:10px;padding:4px 6px;border-radius:4px;background:rgba(0,0,0,0.02)}
.dp-field-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.dp-field-dot.known{background:var(--green)}
.dp-field-dot.inferred{background:var(--accent)}
.dp-field-dot.guess{background:var(--amber)}
.dp-field-dot.unknown{background:#CBD5E0}
.dp-field-name{flex:1;color:var(--t2)}
.dp-field-val{color:var(--t4);font-size:9px}

/* ── Preview Button in Panel ──────────── */
.preview-btn{
  display:flex;align-items:center;justify-content:center;gap:6px;width:100%;
  padding:10px 16px;border-radius:8px;border:1px solid rgba(63,175,122,0.25);
  background:rgba(63,175,122,0.04);color:var(--green-dark);font:600 12px 'Inter',sans-serif;
  cursor:pointer;transition:all 0.2s;margin-bottom:14px;
}
.preview-btn:hover{background:rgba(63,175,122,0.10);border-color:var(--green);color:var(--green)}
.preview-btn-icon{font-size:14px}

/* ── Preview Modal (renders to the left) ─ */
.preview-overlay{display:none;position:fixed;inset:0;z-index:300;background:rgba(10,30,47,0.35)}
.preview-overlay.open{display:flex;align-items:center;justify-content:center}

.preview-modal{
  background:var(--card);border-radius:14px;width:720px;max-width:calc(100vw - 540px);
  max-height:85vh;box-shadow:0 24px 64px rgba(10,30,47,0.25);
  display:flex;flex-direction:column;overflow:hidden;
  animation:previewIn 0.35s cubic-bezier(.4,0,.2,1);
  margin-right:500px;
}
@keyframes previewIn{from{opacity:0;transform:scale(0.95) translateY(12px)}to{opacity:1;transform:scale(1) translateY(0)}}

.pm-header{
  padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;
  background:linear-gradient(135deg, var(--subtle) 0%, rgba(63,175,122,0.03) 100%);flex-shrink:0;
}
.pm-title{font-size:14px;font-weight:700;color:var(--t1);flex:1}
.pm-pattern{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:0.04em;padding:3px 8px;border-radius:4px;background:var(--accent-pale);color:var(--accent)}
.pm-close{width:28px;height:28px;border-radius:50%;border:1px solid var(--border);background:var(--card);color:var(--t4);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:0.15s}
.pm-close:hover{background:var(--subtle);color:var(--t1)}

.pm-body{flex:1;overflow-y:auto;padding:20px}
.pm-hint{font-size:10px;color:var(--t5);text-align:center;margin-top:12px;font-style:italic}

/* ── Mock UI Patterns ─────────────────── */

/* Dashboard */
.mock-ui-dashboard{display:flex;flex-direction:column;gap:12px}
.mock-ui-kpis{display:grid;grid-template-columns:repeat(auto-fit, minmax(140px, 1fr));gap:10px}
.mock-ui-kpi{background:var(--subtle);border:1px solid var(--border);border-radius:8px;padding:14px 16px;text-align:center}
.mock-ui-kpi-val{font-size:24px;font-weight:800;color:var(--green);line-height:1.1;margin-bottom:2px}
.mock-ui-kpi-label{font-size:9px;color:var(--t4);text-transform:uppercase;letter-spacing:0.04em;font-weight:500}
.mock-ui-chart{background:var(--subtle);border:1px solid var(--border);border-radius:8px;padding:16px;height:120px;position:relative;overflow:hidden}
.mock-ui-chart-title{font-size:10px;font-weight:600;color:var(--t3);margin-bottom:8px}
.mock-ui-bars{display:flex;align-items:flex-end;gap:6px;height:80px}
.mock-ui-bar{flex:1;background:linear-gradient(180deg, var(--green) 0%, rgba(63,175,122,0.4) 100%);border-radius:3px 3px 0 0;transition:height 0.5s ease}
.mock-ui-alert{background:rgba(212,160,23,0.06);border:1px solid rgba(212,160,23,0.15);border-radius:8px;padding:10px 14px;display:flex;align-items:center;gap:10px}
.mock-ui-alert-icon{width:24px;height:24px;border-radius:50%;background:var(--amber-pale);color:#8B6914;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.mock-ui-alert-text{font-size:11px;color:var(--t2);line-height:1.4;flex:1}
.mock-ui-alert-action{font-size:10px;font-weight:600;color:var(--green-dark);cursor:pointer;flex-shrink:0}

/* Table */
.mock-ui-table{width:100%;border-collapse:separate;border-spacing:0;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.mock-ui-table th{text-align:left;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:0.04em;color:var(--t4);padding:8px 12px;background:var(--subtle);border-bottom:1px solid var(--border)}
.mock-ui-table td{font-size:11px;color:var(--t2);padding:8px 12px;border-bottom:1px solid rgba(0,0,0,0.03)}
.mock-ui-table tr:last-child td{border-bottom:none}
.mock-ui-table .val-green{color:var(--green-dark);font-weight:600}
.mock-ui-table .val-amber{color:#8B6914;font-weight:500}
.mock-ui-table .score-bar{width:60px;height:4px;background:var(--subtle);border-radius:2px;overflow:hidden;display:inline-block;vertical-align:middle;margin-left:6px}
.mock-ui-table .score-fill{height:100%;background:var(--green);border-radius:2px}

/* Wizard */
.mock-ui-wizard{display:flex;flex-direction:column;gap:16px}
.mock-ui-wiz-steps{display:flex;align-items:center;justify-content:center;gap:0;padding:0 40px}
.mock-ui-wiz-step{display:flex;flex-direction:column;align-items:center;gap:4px;position:relative}
.mock-ui-wiz-dot{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
.mock-ui-wiz-dot.done{background:var(--green);color:#fff}
.mock-ui-wiz-dot.current{background:var(--green);color:#fff;box-shadow:0 0 0 4px var(--green-glow)}
.mock-ui-wiz-dot.pending{background:var(--subtle);color:var(--t5);border:2px solid var(--border)}
.mock-ui-wiz-label{font-size:9px;color:var(--t4);font-weight:500;white-space:nowrap}
.mock-ui-wiz-line{width:60px;height:2px;background:var(--border);margin:0 -4px;margin-top:-18px;z-index:-1}
.mock-ui-wiz-line.done{background:var(--green)}
.mock-ui-wiz-form{background:var(--subtle);border-radius:8px;padding:16px;display:flex;flex-direction:column;gap:10px}
.mock-ui-form-field{display:flex;flex-direction:column;gap:3px}
.mock-ui-form-label{font-size:9px;font-weight:500;color:var(--t4)}
.mock-ui-form-input{height:32px;background:var(--card);border:1px solid var(--border);border-radius:6px;padding:0 10px;font-size:11px;color:var(--t2);display:flex;align-items:center}

/* Card view */
.mock-ui-cards{display:grid;grid-template-columns:repeat(auto-fill, minmax(180px, 1fr));gap:10px}
.mock-ui-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px;display:flex;flex-direction:column;gap:6px}
.mock-ui-card-header{display:flex;align-items:center;justify-content:space-between}
.mock-ui-card-title{font-size:11px;font-weight:600;color:var(--t1)}
.mock-ui-card-badge{font-size:8px;font-weight:600;padding:2px 6px;border-radius:3px}
.mock-ui-card-badge.green{background:var(--green-pale);color:var(--green-dark)}
.mock-ui-card-badge.amber{background:var(--amber-pale);color:#8B6914}
.mock-ui-card-val{font-size:18px;font-weight:700;color:var(--t1)}
.mock-ui-card-sub{font-size:9px;color:var(--t4)}
.mock-ui-card-bar{height:3px;background:var(--subtle);border-radius:2px;overflow:hidden}
.mock-ui-card-bar-fill{height:100%;border-radius:2px;background:var(--green)}

/* Form */
.mock-ui-form{background:var(--subtle);border-radius:8px;padding:20px;display:flex;flex-direction:column;gap:12px;max-width:400px}
.mock-ui-form-row{display:flex;gap:10px}
.mock-ui-form-row .mock-ui-form-field{flex:1}
.mock-ui-form-btn{padding:8px 20px;border-radius:6px;border:none;background:var(--green);color:#fff;font:600 11px 'Inter',sans-serif;cursor:pointer;align-self:flex-start}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.station{animation:fadeUp .4s ease backwards}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="header-row">
      <div class="thesis">
        This solution transforms <em>manual inventory classification</em> into an AI-assisted pipeline &mdash; what takes <em>2 weeks of spreadsheet work</em> becomes same-day intelligent processing.
      </div>
      <div class="pills">
        <div class="pill"><span class="pill-val">6</span><span class="pill-lbl">Pains Solved</span></div>
        <div class="pill"><span class="pill-val">8.5 hrs</span><span class="pill-lbl">Saved / Cycle</span></div>
        <div class="pill"><span class="pill-val">$340K</span><span class="pill-lbl">Value / Year</span></div>
      </div>
    </div>
    <div class="controls">
      <div class="persona-pills" id="personaPills"></div>
      <button class="present-btn">Present</button>
    </div>
  </header>
  <div class="main">
    <div class="canvas">
      <div class="phase-lanes" id="phaseLanes"></div>
      <div class="momentum-strip">
        <span class="mom-label">Value Momentum</span>
        <div class="mom-track"><div class="mom-fill" id="momFill" style="width:0%"></div></div>
        <span class="mom-pct" id="momPct">0%</span>
      </div>
    </div>
  </div>
</div>

<!-- Detail Panel -->
<div class="panel-backdrop" id="panelBackdrop" onclick="closePanel()"></div>
<div class="detail-panel" id="detailPanel">
  <div class="dp-header" id="dpHeader"></div>
  <div class="dp-content" id="dpContent"></div>
</div>

<!-- Preview Modal -->
<div class="preview-overlay" id="previewOverlay" onclick="if(event.target===this)closePreview()">
  <div class="preview-modal" id="previewModal">
    <div class="pm-header" id="pmHeader"></div>
    <div class="pm-body" id="pmBody"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════════════════════

const personas = [
  { name: "Sarah Chen", color: "#3FAF7A", initials: "SC" },
  { name: "Tom Rivera", color: "#044159", initials: "TR" },
  { name: "Alex Kim", color: "#2D6B4A", initials: "AK" },
  { name: "Lisa Park", color: "#0A1E2F", initials: "LP" },
];

const steps = [
  {

    phase: "entry", actors: ["Sarah Chen", "Alex Kim"], implied_pattern: "wizard",

    phase: "entry", actors: ["Sarah Chen"], implied_pattern: "form",
    narrative: "Sarah uploads 24 months of inventory transactions — 47,000 records. The system auto-maps columns, flagging 12 that need manual mapping. After 8 minutes: 94% auto-classified.",
    beforeAfter: null,
    fields: [
      { name: "Records imported", type: "computed", val: "47,000", conf: "known" },
      { name: "Auto-mapped fields", type: "computed", val: "18/30", conf: "inferred" },
      { name: "AI training quality", type: "computed", val: "87%", conf: "inferred" },
      { name: "Historical baseline", type: "computed", val: "24 months", conf: "known" },
    ],
    questions: [{ q: "Import all 3 warehouses simultaneously or phase by location?", ctx: "Phased reduces risk but delays AI training" }],
    ai_config: null,
  },
  {
    title: "AI Inventory Classification", goal: "Automatically classify new arrivals — humans only review exceptions",
    phase: "core_experience", actors: ["Sarah Chen", "Alex Kim"], implied_pattern: "dashboard",
    narrative: "Sarah opens her morning dashboard. 247 new items. AI pre-classified 89% with confidence above 90%. She reviews 27 exceptions in 4 minutes. Yesterday that took 3 hours.",
    beforeAfter: { before: ["3 hours per 250 items", "12% error rate"], after: ["4 minutes for 247 items", "2% error rate"] },
    fields: [
      { name: "Items pending", type: "displayed", val: "247 new", conf: "known" },
      { name: "Auto-classified", type: "computed", val: "220 (89%)", conf: "known" },
      { name: "Exception queue", type: "computed", val: "27 for review", conf: "known" },
      { name: "AI confidence", type: "computed", val: "94.2%", conf: "inferred" },
      { name: "Correction rate", type: "computed", val: "1.2%", conf: "known" },
    ],
    questions: [],
    ai_config: { role: "Pre-classify items", behaviors: ["Auto-classify above 90%", "Flag exceptions", "Learn from corrections"] },
  },
  {
    title: "Smart Vendor Matching", goal: "Link classified items to best vendors by performance, cost, and history",
    phase: "core_experience", actors: ["Tom Rivera"], implied_pattern: "table",
    narrative: "Tom sees 220 items ready for vendor matching. System pre-matched 85%. For 'Custom Fabrication', 3 vendors ranked by quality, lead time, cost. Total: 8 minutes.",
    beforeAfter: { before: ["45 min per batch", "Relies on memory"], after: ["8 min per batch", "Performance-ranked"] },
    fields: [
      { name: "Items ready", type: "displayed", val: "220", conf: "known" },
      { name: "Auto-matched", type: "computed", val: "187 (85%)", conf: "inferred" },
      { name: "Top vendor score", type: "computed", val: "94/100", conf: "inferred" },
      { name: "Alt. vendors", type: "computed", val: "3 ranked", conf: "inferred" },
    ],
    questions: [{ q: "Consider warehouse proximity?", ctx: "Could reduce shipping 15-20%" }],
    ai_config: { role: "Match items to vendors", behaviors: ["Rank by quality, lead time, cost", "Learn from overrides"] },
  },
  {
    title: "Inventory Health Dashboard", goal: "Real-time health, classification accuracy, and trend alerts",
    phase: "core_experience", actors: ["Sarah Chen", "Lisa Park"], implied_pattern: "dashboard",
    narrative: "Lisa opens her executive dashboard. Health: 94% — up from 78%. Alert: 'Supplier B lead time +40%' — AI recommends shifting 12 items to Supplier A.",
    beforeAfter: null,
    fields: [
      { name: "Health score", type: "computed", val: "94%", conf: "inferred" },
      { name: "Classification accuracy", type: "displayed", val: "96.2%", conf: "known" },
      { name: "Days on hand", type: "computed", val: "32 (was 45)", conf: "known" },
      { name: "Vendor fill rate", type: "displayed", val: "91%", conf: "inferred" },
    ],
    questions: [],

  },
  {
    title: "Predictive Reorder Engine", goal: "AI-predicted reorder points from consumption, lead times, seasonal patterns",
    phase: "core_experience", actors: ["Tom Rivera", "Sarah Chen"], implied_pattern: "card",
    narrative: "Tom reviews recommendations. AI flagged 34 items approaching reorder. 'Stainless Steel Fasteners' Q4 surge — recommends +20%. Tom approves 28 with one click.",
    beforeAfter: { before: ["Reactive ordering", "Stockouts happen"], after: ["30-day forecasts", "Zero stockouts"] },
    fields: [
      { name: "Items flagged", type: "computed", val: "34", conf: "inferred" },
      { name: "Seasonal prediction", type: "computed", val: "+20% Q4", conf: "guess" },
      { name: "Est. savings", type: "computed", val: "$47K", conf: "guess" },
      { name: "Auto-approved", type: "computed", val: "28/34", conf: "known" },
    ],
    questions: [{ q: "Risk tolerance for AI quantities?", ctx: "Higher = more automation" }],
    ai_config: { role: "Predict reorder points", behaviors: ["24-month analysis", "Seasonal detection", "Auto-generate POs"] },
  },
  {
    title: "Compliance & Analytics Reports", goal: "Audit-ready reports in seconds, not days",
    phase: "output", actors: ["Lisa Park", "Sarah Chen"], implied_pattern: "form",
    narrative: "Lisa clicks 'Generate Q3 Report'. Branded PDF in 12 seconds. Last quarter: 2 days.",
    beforeAfter: { before: ["2 days to compile"], after: ["12-second generation"] },
    fields: [
      { name: "Report types", type: "displayed", val: "Compliance, Analytics", conf: "known" },
      { name: "Generation time", type: "computed", val: "12 seconds", conf: "inferred" },
    ],
    questions: [], ai_config: null,
  },
  {
    title: "AI Rules & Tuning", goal: "Fine-tune AI thresholds and classification overrides",
    phase: "admin", actors: ["Sarah Chen"], implied_pattern: "form",
    narrative: "Sarah adjusts confidence threshold to 85%. Adds rule: 'Supplier X → Industrial Grade.' Reviews learning: 847 corrections, 87→96%.",
    beforeAfter: null,
    fields: [
      { name: "Confidence threshold", type: "captured", val: "85%", conf: "known" },
      { name: "Custom rules", type: "captured", val: "14 active", conf: "known" },
      { name: "Learning log", type: "computed", val: "847 → 96%", conf: "known" },
    ],
    questions: [], ai_config: null,
  },
];

const PHASES = {
  entry: { label: "Getting Started", sub: "Setup & onboarding", steps: [] },
  core_experience: { label: "The Core Experience", sub: "Where the value lives", steps: [] },
  output: { label: "What You Get", sub: "Reports & deliverables", steps: [] },
  admin: { label: "Keeping It Sharp", sub: "Configuration & tuning", steps: [] },
};
steps.forEach((s, i) => { s._idx = i; PHASES[s.phase].steps.push(s); });

const state = { activeStep: null, activePersona: null };

// ═══════════════════════════════════════════════════════════════
// PREVIEW MOCK UI GENERATORS
// ═══════════════════════════════════════════════════════════════

function generatePreview(s) {
  const p = s.implied_pattern;
  const displayed = s.fields.filter(f => f.type === 'displayed' || f.type === 'computed');

  if (p === 'dashboard') {
    const kpis = displayed.slice(0, 4);
    const barHeights = [65, 45, 78, 55, 82, 40, 72, 88, 52, 70, 60, 85];
    return `<div class="mock-ui-dashboard">
      <div class="mock-ui-kpis">
        ${kpis.map(f => `<div class="mock-ui-kpi"><div class="mock-ui-kpi-val">${f.val}</div><div class="mock-ui-kpi-label">${f.name}</div></div>`).join('')}
      </div>
      <div class="mock-ui-chart">
        <div class="mock-ui-chart-title">Trend — Last 12 Weeks</div>
        <div class="mock-ui-bars">
          ${barHeights.map(h => `<div class="mock-ui-bar" style="height:${h}%"></div>`).join('')}
        </div>
      </div>
      ${s.ai_config ? `<div class="mock-ui-alert">
        <div class="mock-ui-alert-icon">!</div>
        <div class="mock-ui-alert-text">AI Alert: Supplier B lead time increased 40% — recommend shifting 12 items to Supplier A</div>
        <div class="mock-ui-alert-action">Review →</div>
      </div>` : ''}
    </div>`;
  }

  if (p === 'table') {
    return `<table class="mock-ui-table">
      <thead><tr><th>Item</th><th>Classification</th><th>Vendor</th><th>Score</th><th>Status</th></tr></thead>
      <tbody>
        <tr><td>Stainless Steel Fasteners</td><td>Industrial Grade</td><td>Supplier A</td><td><span class="val-green">94</span><span class="score-bar"><span class="score-fill" style="width:94%"></span></span></td><td class="val-green">Matched</td></tr>
        <tr><td>Copper Wire Assemblies</td><td>Electrical</td><td>Supplier C</td><td><span class="val-green">91</span><span class="score-bar"><span class="score-fill" style="width:91%"></span></span></td><td class="val-green">Matched</td></tr>
        <tr><td>Custom Fabrication Parts</td><td>Custom</td><td>—</td><td><span class="val-amber">—</span></td><td class="val-amber">Review</td></tr>
        <tr><td>Rubber Gasket Set</td><td>Sealing</td><td>Supplier B</td><td><span class="val-green">87</span><span class="score-bar"><span class="score-fill" style="width:87%"></span></span></td><td class="val-green">Matched</td></tr>
        <tr><td>Hydraulic Valves</td><td>Mechanical</td><td>Supplier A</td><td><span class="val-green">92</span><span class="score-bar"><span class="score-fill" style="width:92%"></span></span></td><td class="val-green">Matched</td></tr>
      </tbody>
    </table>`;
  }

  if (p === 'wizard') {
    const wizSteps = s.fields.filter(f => f.type === 'captured').map(f => f.name);
    if (wizSteps.length < 3) wizSteps.push('Review & Confirm');
    return `<div class="mock-ui-wizard">
      <div class="mock-ui-wiz-steps">
        ${wizSteps.map((ws, i) => `
          ${i > 0 ? `<div class="mock-ui-wiz-line${i <= 1 ? ' done' : ''}"></div>` : ''}
          <div class="mock-ui-wiz-step">
            <div class="mock-ui-wiz-dot ${i === 0 ? 'done' : i === 1 ? 'current' : 'pending'}">${i < 1 ? '✓' : i + 1}</div>
            <div class="mock-ui-wiz-label">${ws}</div>
          </div>
        `).join('')}
      </div>
      <div class="mock-ui-wiz-form">
        ${s.fields.slice(0, 3).map(f => `<div class="mock-ui-form-field">
          <div class="mock-ui-form-label">${f.name}</div>
          <div class="mock-ui-form-input">${f.val}</div>
        </div>`).join('')}
      </div>
    </div>`;
  }

  if (p === 'card') {
    const items = [
      { title: 'Stainless Steel Fasteners', badge: '+20% Q4', badgeClass: 'amber', val: '340 units', sub: 'Reorder point: 15 days', pct: 78 },
      { title: 'Copper Wire Assemblies', badge: 'Stable', badgeClass: 'green', val: '120 units', sub: 'Reorder point: 22 days', pct: 92 },
      { title: 'Hydraulic Valves', badge: '+8% Q4', badgeClass: 'amber', val: '85 units', sub: 'Reorder point: 18 days', pct: 65 },
      { title: 'Rubber Gasket Set', badge: 'Stable', badgeClass: 'green', val: '560 units', sub: 'Reorder point: 30 days', pct: 88 },
    ];
    return `<div class="mock-ui-cards">${items.map(c => `
      <div class="mock-ui-card">
        <div class="mock-ui-card-header"><div class="mock-ui-card-title">${c.title}</div><span class="mock-ui-card-badge ${c.badgeClass}">${c.badge}</span></div>
        <div class="mock-ui-card-val">${c.val}</div>
        <div class="mock-ui-card-sub">${c.sub}</div>
        <div class="mock-ui-card-bar"><div class="mock-ui-card-bar-fill" style="width:${c.pct}%"></div></div>
      </div>
    `).join('')}</div>`;
  }

  // Form (default)
  return `<div class="mock-ui-form">
    ${s.fields.map(f => `<div class="mock-ui-form-field">
      <div class="mock-ui-form-label">${f.name}</div>
      <div class="mock-ui-form-input">${f.val}</div>
    </div>`).join('')}
    <div class="mock-ui-form-row"><div class="mock-ui-form-btn">Generate</div></div>
  </div>`;
}

// ═══════════════════════════════════════════════════════════════
// RENDER CANVAS
// ═══════════════════════════════════════════════════════════════

function renderAll() {
  renderPersonas();
  renderLanes();
  setTimeout(() => {
    document.getElementById('momFill').style.width = '100%';
    document.getElementById('momPct').textContent = '100%';
  }, 400);
}

function renderPersonas() {
  document.getElementById('personaPills').innerHTML = personas.map((p, i) =>
    `<button class="ppill${state.activePersona === i ? ' active' : ''}" style="--pc:${p.color}" onclick="togglePersona(${i})">
      <div class="pavatar" style="background:${p.color}">${p.initials}</div>${p.name.split(' ')[0]}
    </button>`
  ).join('');
}

function renderLanes() {
  const phaseOrder = ['entry', 'core_experience', 'output', 'admin'];
  const lc = { entry: 'entry', core_experience: 'core', output: 'output', admin: 'admin' };
  const ic = { entry: 'entry-idx', core_experience: 'core-idx', output: 'output-idx', admin: 'admin-idx' };
  const ll = { entry: 'entry-l', core_experience: 'core-l', output: 'output-l', admin: 'admin-l' };

  document.getElementById('phaseLanes').innerHTML = phaseOrder.map(phase => {
    const p = PHASES[phase];
    const isCore = phase === 'core_experience';

    return `<div class="phase-lane ${lc[phase]}" style="flex:${isCore ? 2.8 : 1}">
      <div class="lane-header">
        <div class="lane-label ${ll[phase]}">${p.label}</div>
        <div class="lane-sublabel">${p.sub}</div>
      </div>
      <div class="lane-cards">
        ${p.steps.map(s => {
          const dots = s.actors.map(n => {
            const pp = personas.find(x => x.name === n);
            return pp ? `<div class="pdot" style="background:${pp.color}" title="${pp.name}">${pp.initials}</div>` : '';
          }).join('');

          let transformHtml = '';
          if (s.beforeAfter && isCore) {
            transformHtml = `<div class="st-transform">
              <span class="st-tf-before">${s.beforeAfter.before[0]}</span>
              <span class="st-tf-arrow">→</span>
              <span class="st-tf-after">${s.beforeAfter.after[0]}</span>
            </div>`;
          }

          const bottomBadges = [];
          if (s.ai_config) bottomBadges.push(`<span class="st-ai-badge">◈ AI-Powered</span>`);
          if (s.questions.length) bottomBadges.push(`<span class="st-q-badge">? ${s.questions.length} open</span>`);

          return `<div class="station${isCore ? ' core-value' : ' compact'}"
            data-step="${s._idx}" onclick="openPanel(${s._idx})"
            style="animation-delay:${s._idx * 0.07}s">
            <div class="st-top">
              <div class="st-idx ${ic[phase]}">${s._idx + 1}</div>
              <div class="st-title">${s.title}</div>
              <div class="st-personas">${dots}</div>
            </div>
            <div class="st-goal">${s.goal}</div>
            ${transformHtml}
            <div class="st-bottom">${bottomBadges.join('')}</div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');
}

function togglePersona(index) {
  state.activePersona = state.activePersona === index ? null : index;
  renderPersonas();
  document.querySelectorAll('.station').forEach(el => {
    const idx = parseInt(el.dataset.step);
    if (state.activePersona === null) el.classList.remove('dimmed');
    else el.classList.toggle('dimmed', !steps[idx].actors.includes(personas[state.activePersona].name));
  });
}

// ═══════════════════════════════════════════════════════════════
// DETAIL PANEL
// ═══════════════════════════════════════════════════════════════

function openPanel(index) {
  state.activeStep = index;
  const s = steps[index];
  const pc = { entry: 'var(--accent)', core_experience: 'var(--green)', output: 'var(--navy)', admin: 'var(--t4)' };

  document.getElementById('dpHeader').innerHTML = `
    <div class="dp-icon" style="background:${pc[s.phase]}">${index + 1}</div>
    <div class="dp-meta"><div class="dp-title">${s.title}</div><div class="dp-goal">${s.goal}</div></div>
    <button class="dp-close" onclick="closePanel()">&times;</button>
  `;

  let c = '';

  // Preview button
  c += `<button class="preview-btn" onclick="openPreview(${index})">
    <span class="preview-btn-icon">◧</span> Preview this step
  </button>`;

  // Narrative
  c += `<div class="dp-section"><div class="dp-label">The Story</div><div class="dp-narrative">${s.narrative}</div></div>`;

  // Before/After
  if (s.beforeAfter) {
    c += `<div class="dp-section"><div class="dp-label">Transformation</div><div class="dp-ba">
      <div class="dp-ba-side before"><div class="dp-ba-lbl">Today</div>${s.beforeAfter.before.map(b => `<div class="dp-ba-item">${b}</div>`).join('')}</div>
      <div class="dp-ba-side after"><div class="dp-ba-lbl">Tomorrow</div>${s.beforeAfter.after.map(a => `<div class="dp-ba-item">${a}</div>`).join('')}</div>
    </div></div>`;
  }

  // Fields
  c += `<div class="dp-section"><div class="dp-label">Information Fields (${s.fields.length})</div>
    <div class="dp-field-grid">${s.fields.map(f => `
      <div class="dp-field">
        <span class="dp-field-dot ${f.conf}"></span>
        <span class="dp-field-name">${f.name}</span>
        <span class="dp-field-val">${f.val}</span>
      </div>`).join('')}</div></div>`;

  // AI
  if (s.ai_config) {
    c += `<div class="dp-section"><div class="dp-label">AI Capabilities</div><div class="dp-ai">
      <div class="dp-ai-role">${s.ai_config.role}</div>
      ${s.ai_config.behaviors.map(b => `<div class="dp-ai-behavior">${b}</div>`).join('')}</div></div>`;
  }

  // Questions
  if (s.questions.length) {
    c += `<div class="dp-section"><div class="dp-label">Open Questions (${s.questions.length})</div>
      ${s.questions.map(q => `<div class="dp-question"><div class="dp-q-icon">?</div><div>
        <div class="dp-q-text">${q.q}</div>${q.ctx ? `<div class="dp-q-ctx">${q.ctx}</div>` : ''}
      </div></div>`).join('')}</div>`;
  }

  document.getElementById('dpContent').innerHTML = c;
  document.getElementById('panelBackdrop').classList.add('open');
  document.getElementById('detailPanel').classList.add('open');
  document.querySelectorAll('.station').forEach(el => el.classList.toggle('selected', parseInt(el.dataset.step) === index));
}

function closePanel() {
  state.activeStep = null;
  document.getElementById('panelBackdrop').classList.remove('open');
  document.getElementById('detailPanel').classList.remove('open');
  document.querySelectorAll('.station').forEach(el => el.classList.remove('selected'));
}

// ═══════════════════════════════════════════════════════════════
// PREVIEW MODAL
// ═══════════════════════════════════════════════════════════════

function openPreview(index) {
  const s = steps[index];
  const patternLabels = { wizard: 'Setup Wizard', form: 'Form', dashboard: 'Dashboard', table: 'Data Table', card: 'Card View' };

  document.getElementById('pmHeader').innerHTML = `
    <div class="pm-title">${s.title}</div>
    <span class="pm-pattern">${patternLabels[s.implied_pattern] || s.implied_pattern}</span>
    <button class="pm-close" onclick="closePreview()">&times;</button>
  `;

  document.getElementById('pmBody').innerHTML = generatePreview(s)
    + `<div class="pm-hint">Generated from ${s.fields.length} information fields &middot; Pattern: ${s.implied_pattern}</div>`;

  document.getElementById('previewOverlay').classList.add('open');
}

function closePreview() {
  document.getElementById('previewOverlay').classList.remove('open');
}

// ═══════════════════════════════════════════════════════════════
// KEYBOARD
// ═══════════════════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (document.getElementById('previewOverlay').classList.contains('open')) closePreview();
    else closePanel();
  }
});

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
renderAll();
</script>
</body>
</html>
