<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Intelligence Workbench</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --green:#3FAF7A;--green-dim:rgba(63,175,122,0.10);--green-glow:rgba(63,175,122,0.25);
    --accent:#044159;--navy:#0A1E2F;--surface:#0D2235;--card:#132C40;
    --border:rgba(255,255,255,0.06);--border-active:rgba(63,175,122,0.3);
    --text:rgba(255,255,255,0.88);--text-dim:rgba(255,255,255,0.45);--text-muted:rgba(255,255,255,0.22);
    --amber:#E8A838;--amber-dim:rgba(232,168,56,0.12);
  }
  body{font-family:'Inter',sans-serif;background:var(--navy);color:var(--text);min-height:100vh;overflow:hidden}

  /* ═══ Layout ═══ */
  .app{display:grid;grid-template-columns:1fr;grid-template-rows:48px 1fr;height:100vh}
  .topbar{display:flex;align-items:center;padding:0 20px;background:var(--surface);border-bottom:1px solid var(--border);gap:16px;z-index:10}
  .topbar-logo{display:flex;align-items:center;gap:8px}
  .topbar-icon{width:24px;height:24px;border-radius:6px;background:linear-gradient(135deg,var(--green),#2D9B6A);display:flex;align-items:center;justify-content:center;font-size:11px}
  .topbar-title{font-size:13px;font-weight:700;letter-spacing:-0.01em}
  .topbar-sep{width:1px;height:24px;background:var(--border)}
  .mode-tabs{display:flex;gap:2px;background:rgba(255,255,255,0.04);border-radius:7px;padding:2px}
  .mode-tab{padding:5px 14px;border-radius:5px;font:600 11px 'Inter',sans-serif;color:var(--text-dim);cursor:pointer;transition:0.15s;border:none;background:none}
  .mode-tab:hover{color:var(--text)}
  .mode-tab.active{background:var(--green-dim);color:var(--green)}
  .topbar-spacer{flex:1}
  .topbar-scenario{font-size:11px;color:var(--text-muted)}
  .topbar-scenario select{background:var(--card);color:var(--text-dim);border:1px solid var(--border);border-radius:5px;padding:3px 8px;font:500 11px 'Inter',sans-serif;cursor:pointer}

  .main{display:grid;overflow:hidden}

  /* ═══ Canvas (Flow) ═══ */
  .canvas-wrap{overflow:auto;position:relative}
  .canvas{position:relative;min-height:100%;padding:24px 40px}

  /* Flow nodes */
  .flow-node{
    position:absolute;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:12px;
    padding:16px 18px;cursor:pointer;transition:all 0.25s;min-width:200px;
  }
  .flow-node:hover{background:rgba(255,255,255,0.05);border-color:rgba(255,255,255,0.12);transform:translateY(-2px)}
  .flow-node.selected{border-color:var(--green);box-shadow:0 0 0 1px var(--green-glow),0 8px 30px rgba(0,0,0,0.3)}
  .flow-node.dimmed{opacity:0.15;pointer-events:none}

  .fn-top{display:flex;align-items:center;gap:8px;margin-bottom:8px}
  .fn-icon{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
  .fn-name{font-size:13px;font-weight:700;letter-spacing:-0.01em}
  .fn-technique{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;padding:2px 6px;border-radius:3px;margin-left:auto}
  .tech-llm{background:rgba(147,112,219,0.15);color:#9370DB}
  .tech-classify{background:var(--green-dim);color:var(--green)}
  .tech-embed{background:rgba(232,168,56,0.12);color:var(--amber)}
  .tech-rules{background:rgba(255,255,255,0.06);color:var(--text-dim)}
  .tech-hybrid{background:rgba(63,175,122,0.08);color:#5BBEA0}

  .fn-desc{font-size:10px;color:var(--text-muted);line-height:1.5;margin-bottom:10px}

  .fn-io{display:flex;gap:12px;font-size:9px;margin-bottom:8px}
  .fn-io-col{flex:1}
  .fn-io-label{font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:var(--text-muted);margin-bottom:4px}
  .fn-io-item{color:var(--text-dim);padding:2px 0;display:flex;align-items:center;gap:4px}
  .fn-io-item::before{content:'';width:4px;height:4px;border-radius:50%;flex-shrink:0}
  .fn-io-in::before{background:var(--amber)}
  .fn-io-out::before{background:var(--green)}

  .fn-bar{display:flex;align-items:center;gap:8px;padding-top:8px;border-top:1px solid var(--border)}
  .fn-conf{display:flex;align-items:center;gap:4px}
  .fn-conf-dot{width:6px;height:6px;border-radius:50%}
  .fn-conf-label{font-size:9px;color:var(--text-muted)}
  .fn-rhythm{font-size:8px;font-weight:600;text-transform:uppercase;letter-spacing:0.04em;padding:2px 6px;border-radius:3px;margin-left:auto}
  .rhythm-triggered{background:rgba(63,175,122,0.08);color:var(--green)}
  .rhythm-always{background:rgba(232,168,56,0.08);color:var(--amber)}
  .rhythm-requested{background:rgba(147,112,219,0.1);color:#9370DB}
  .rhythm-periodic{background:rgba(255,255,255,0.05);color:var(--text-dim)}

  /* SVG edges */
  .edge-svg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
  .edge-path{stroke:var(--green);stroke-width:1;stroke-dasharray:5 4;fill:none;opacity:0.15;transition:opacity 0.2s}
  .edge-path.hl{opacity:0.5;stroke-width:1.5}
  .edge-label{font:500 8px 'Inter',sans-serif;fill:var(--text-muted)}

  /* Data source nodes */
  .data-node{
    position:absolute;padding:10px 14px;border-radius:10px;border:1px dashed rgba(232,168,56,0.25);
    background:rgba(232,168,56,0.03);font-size:10px;font-weight:600;color:var(--amber);
    display:flex;align-items:center;gap:6px;cursor:default;
  }
  .data-node-icon{font-size:14px}

  /* Output nodes */
  .output-node{
    position:absolute;padding:10px 14px;border-radius:10px;border:1px dashed rgba(63,175,122,0.3);
    background:rgba(63,175,122,0.03);font-size:10px;font-weight:600;color:var(--green);
    display:flex;align-items:center;gap:6px;cursor:default;
  }
  .output-node-icon{font-size:14px}

  /* ═══ Detail Panel (slide-in) ═══ */
  .detail-overlay{
    position:fixed;inset:0;background:rgba(10,30,47,0.5);z-index:100;display:none;opacity:0;transition:opacity 0.25s;
  }
  .detail-overlay.open{display:flex;opacity:1}
  .detail-panel{
    position:fixed;top:0;right:0;width:520px;height:100vh;background:var(--surface);
    border-left:1px solid var(--border);z-index:101;transform:translateX(100%);
    transition:transform 0.3s ease;display:flex;flex-direction:column;overflow:hidden;
  }
  .detail-panel.open{transform:translateX(0)}

  .dp-header{padding:20px 24px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
  .dp-close{position:absolute;top:16px;right:16px;width:28px;height:28px;border-radius:50%;border:1px solid var(--border);background:rgba(255,255,255,0.03);color:var(--text-dim);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .dp-close:hover{background:rgba(255,255,255,0.08);color:white}
  .dp-icon-row{display:flex;align-items:center;gap:12px;margin-bottom:12px}
  .dp-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px}
  .dp-name{font-size:20px;font-weight:800;letter-spacing:-0.02em}
  .dp-badges{display:flex;gap:6px;margin-top:4px}
  .dp-badge{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;padding:3px 8px;border-radius:4px}
  .dp-role{font-size:13px;color:var(--text-dim);line-height:1.6;margin-top:10px}

  .dp-body{flex:1;overflow-y:auto;padding:20px 24px}

  /* Detail sections */
  .ds{margin-bottom:20px}
  .ds-title{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted);margin-bottom:10px;display:flex;align-items:center;gap:6px}
  .ds-title-icon{font-size:12px}

  .ds-card{background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:8px}
  .ds-card-label{font-size:10px;font-weight:700;color:var(--text-dim);margin-bottom:6px}
  .ds-card-text{font-size:12px;color:var(--text);line-height:1.55}

  .ds-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .ds-grid-item{background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:8px;padding:10px 12px}
  .ds-grid-val{font-size:16px;font-weight:800;color:var(--green);margin-bottom:2px}
  .ds-grid-label{font-size:9px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.04em;font-weight:600}

  /* Confidence tiers */
  .conf-tier{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;background:rgba(255,255,255,0.02);border:1px solid var(--border);margin-bottom:6px}
  .conf-tier-bar{width:40px;height:6px;border-radius:3px;overflow:hidden;background:rgba(255,255,255,0.06)}
  .conf-tier-fill{height:100%;border-radius:3px}
  .conf-tier-range{font-size:10px;font-weight:700;color:var(--text-dim);width:50px}
  .conf-tier-action{font-size:10px;color:var(--text-dim);flex:1}

  /* Evolution timeline */
  .evo-step{display:flex;gap:12px;margin-bottom:12px}
  .evo-dot-col{display:flex;flex-direction:column;align-items:center}
  .evo-dot{width:10px;height:10px;border-radius:50%;border:2px solid var(--border);background:var(--card);flex-shrink:0}
  .evo-dot.done{border-color:var(--green);background:var(--green-dim)}
  .evo-line{width:2px;flex:1;min-height:12px;background:var(--border)}
  .evo-done .evo-line{background:rgba(63,175,122,0.3)}
  .evo-body{}
  .evo-when{font-size:9px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.04em}
  .evo-what{font-size:11px;color:var(--text-dim);line-height:1.5;margin-top:2px}
  .evo-auto{font-size:10px;font-weight:600;color:var(--green);margin-top:2px}

  /* ═══ Try It Panel ═══ */
  .dp-footer{flex-shrink:0;border-top:1px solid var(--border);background:rgba(0,0,0,0.15);max-height:55vh;display:flex;flex-direction:column;overflow:hidden}

  .try-tabs{display:flex;border-bottom:1px solid var(--border);padding:0 24px;flex-shrink:0}
  .try-tab{padding:10px 14px;font:600 10px 'Inter',sans-serif;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-muted);cursor:pointer;border-bottom:2px solid transparent;transition:0.15s}
  .try-tab:hover{color:var(--text-dim)}
  .try-tab.active{color:var(--green);border-bottom-color:var(--green)}

  .try-body{flex:1;overflow-y:auto;padding:14px 24px}

  /* Input area */
  .try-input-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-muted);margin-bottom:6px;display:flex;align-items:center;gap:6px}
  .try-textarea{
    width:100%;min-height:60px;max-height:100px;padding:10px 12px;border-radius:8px;border:1px solid var(--border);
    background:rgba(255,255,255,0.03);color:var(--text);font:400 11px/1.6 'Inter',sans-serif;
    outline:none;resize:vertical;transition:border-color 0.2s;
  }
  .try-textarea:focus{border-color:var(--border-active)}
  .try-textarea::placeholder{color:var(--text-muted)}
  .try-run-row{display:flex;gap:8px;margin-top:8px;margin-bottom:12px}
  .try-run{
    padding:8px 18px;border-radius:8px;border:1px solid var(--border-active);
    background:var(--green-dim);color:var(--green);font:600 11px 'Inter',sans-serif;
    cursor:pointer;transition:0.2s;display:flex;align-items:center;gap:6px;
  }
  .try-run:hover{background:var(--green);color:white}
  .try-run.loading{opacity:0.6;pointer-events:none}
  .try-preset{
    padding:8px 12px;border-radius:8px;border:1px solid var(--border);
    background:rgba(255,255,255,0.02);color:var(--text-muted);font:500 10px 'Inter',sans-serif;
    cursor:pointer;transition:0.15s;
  }
  .try-preset:hover{background:rgba(255,255,255,0.05);color:var(--text-dim);border-color:rgba(255,255,255,0.1)}

  /* Client-facing output */
  .try-output{display:none}
  .try-output.visible{display:block;animation:fadeUp 0.3s ease}

  .out-section{margin-bottom:14px}
  .out-section-title{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-muted);margin-bottom:8px}

  .out-entity{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-radius:8px;background:rgba(255,255,255,0.02);border:1px solid var(--border);margin-bottom:6px}
  .out-entity-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
  .out-entity-body{flex:1;min-width:0}
  .out-entity-type{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:2px}
  .out-entity-text{font-size:12px;color:var(--text);line-height:1.4}
  .out-entity-evidence{font-size:10px;color:var(--text-muted);font-style:italic;margin-top:3px;line-height:1.4}
  .out-entity-conf{font-size:9px;font-weight:600;padding:2px 6px;border-radius:3px;margin-left:auto;flex-shrink:0;align-self:flex-start}
  .conf-high{background:var(--green-dim);color:var(--green)}
  .conf-mid{background:var(--amber-dim);color:var(--amber)}
  .conf-low{background:rgba(255,255,255,0.04);color:var(--text-muted)}

  .out-narrative{font-size:12px;color:var(--text-dim);line-height:1.7;padding:12px 14px;border-radius:8px;border-left:3px solid var(--green);background:rgba(63,175,122,0.03)}
  .out-probe{display:flex;gap:10px;padding:10px 12px;border-radius:8px;background:rgba(232,168,56,0.04);border:1px solid rgba(232,168,56,0.12);margin-bottom:6px}
  .out-probe-icon{font-size:14px;flex-shrink:0}
  .out-probe-q{font-size:12px;color:var(--text);line-height:1.4;font-weight:500}
  .out-probe-why{font-size:10px;color:var(--text-muted);margin-top:3px;line-height:1.4}

  .out-step{display:flex;gap:12px;padding:12px;border-radius:8px;background:rgba(255,255,255,0.02);border:1px solid var(--border);margin-bottom:8px}
  .out-step-num{width:28px;height:28px;border-radius:8px;background:var(--green-dim);color:var(--green);font:700 12px 'Inter',sans-serif;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .out-step-body{flex:1}
  .out-step-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:2px}
  .out-step-goal{font-size:11px;color:var(--text-dim);line-height:1.4}
  .out-step-ai{font-size:9px;color:var(--green);font-weight:600;margin-top:4px}

  .out-risk{padding:10px 12px;border-radius:8px;margin-bottom:6px;display:flex;align-items:flex-start;gap:10px}
  .out-risk.critical{background:rgba(220,80,80,0.08);border:1px solid rgba(220,80,80,0.15)}
  .out-risk.warning{background:rgba(232,168,56,0.06);border:1px solid rgba(232,168,56,0.12)}
  .out-risk.advisory{background:rgba(255,255,255,0.02);border:1px solid var(--border)}
  .out-risk-level{font-size:8px;font-weight:800;text-transform:uppercase;letter-spacing:0.05em;padding:2px 6px;border-radius:3px;flex-shrink:0}
  .out-risk-level.critical{background:rgba(220,80,80,0.15);color:#DC5050}
  .out-risk-level.warning{background:var(--amber-dim);color:var(--amber)}
  .out-risk-level.advisory{background:rgba(255,255,255,0.05);color:var(--text-dim)}
  .out-risk-text{font-size:11px;color:var(--text-dim);line-height:1.4}
  .out-risk-action{font-size:10px;color:var(--green);margin-top:3px;font-weight:500}

  /* Chat */
  .chat-thread{margin-bottom:10px}
  .chat-msg{padding:8px 12px;border-radius:8px;margin-bottom:6px;max-width:90%;font-size:11px;line-height:1.6}
  .chat-msg.user{background:rgba(63,175,122,0.08);border:1px solid rgba(63,175,122,0.15);color:var(--text);margin-left:auto}
  .chat-msg.ai{background:rgba(255,255,255,0.03);border:1px solid var(--border);color:var(--text-dim)}
  .chat-input-row{display:flex;gap:8px;margin-top:8px}
  .chat-input{
    flex:1;padding:8px 12px;border-radius:8px;border:1px solid var(--border);
    background:rgba(255,255,255,0.03);color:var(--text);font:400 11px 'Inter',sans-serif;
    outline:none;transition:border-color 0.2s;
  }
  .chat-input:focus{border-color:var(--border-active)}
  .chat-input::placeholder{color:var(--text-muted)}
  .chat-send{
    padding:8px 14px;border-radius:8px;border:1px solid var(--border);
    background:rgba(255,255,255,0.03);color:var(--text-dim);font:600 11px 'Inter',sans-serif;
    cursor:pointer;transition:0.15s;
  }
  .chat-send:hover{background:var(--green-dim);color:var(--green);border-color:var(--border-active)}

  @keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  @keyframes pulse{0%,100%{opacity:0.4}50%{opacity:1}}
  .typing{animation:pulse 1s infinite}
</style>
</head>
<body>

<div class="app">
  <!-- Top Bar -->
  <div class="topbar">
    <div class="topbar-logo">
      <div class="topbar-icon">⚡</div>
      <div class="topbar-title">Intelligence Workbench</div>
    </div>
    <div class="topbar-sep"></div>
    <div class="mode-tabs">
      <button class="mode-tab active" onclick="setMode('architect')" id="tab-architect">Architect</button>
      <button class="mode-tab" onclick="setMode('client')" id="tab-client">Client</button>
      <button class="mode-tab" onclick="setMode('build')" id="tab-build">Build</button>
    </div>
    <div class="topbar-spacer"></div>
    <div class="topbar-scenario">
      <select onchange="setScenario(this.value)" id="scenario-select">
        <option value="aios">AIOS — Requirements Engine</option>
        <option value="regaffairs">Proquint — Regulatory Affairs</option>
      </select>
    </div>
  </div>

  <!-- Main Canvas -->
  <div class="canvas-wrap">
    <div class="canvas" id="canvas"></div>
  </div>
</div>

<!-- Detail Panel -->
<div class="detail-overlay" id="detail-overlay" onclick="closeDetail()"></div>
<div class="detail-panel" id="detail-panel">
  <div class="dp-header" id="dp-header"></div>
  <div class="dp-body" id="dp-body"></div>
  <div class="dp-footer" id="dp-footer"></div>
</div>

<script>
// ═══ State ═══════════════════════════════════════
const S = { scenario: 'aios', mode: 'architect', selected: null, hovered: null };

// ═══ Data ════════════════════════════════════════
const SCENARIOS = {
aios: {
  name: 'AIOS Requirements Engine',
  dataSources: [
    { id: 'ds-transcripts', label: 'Meeting Transcripts', icon: '🎙️', x: 30, y: 40 },
    { id: 'ds-emails', label: 'Client Emails', icon: '📧', x: 30, y: 120 },
    { id: 'ds-docs', label: 'Research Docs', icon: '📄', x: 30, y: 200 },
    { id: 'ds-calls', label: 'Live Calls', icon: '📞', x: 30, y: 290 },
  ],
  outputs: [
    { id: 'out-brd', label: 'Business Req Doc', icon: '📋', x: 950, y: 60 },
    { id: 'out-flow', label: 'Solution Flow', icon: '🏗️', x: 950, y: 140 },
    { id: 'out-proto', label: 'Working Prototype', icon: '🎨', x: 950, y: 220 },
    { id: 'out-brief', label: 'Session Briefing', icon: '📊', x: 950, y: 310 },
  ],
  agents: [
    {
      id: 'signal', name: 'Signal Processor', icon: '📡', iconBg: 'rgba(63,175,122,0.12)',
      x: 260, y: 60, w: 210,
      technique: 'hybrid', techniqueLabel: 'Hybrid',
      rhythm: 'triggered', rhythmLabel: 'On Signal',
      desc: 'Classifies incoming signals, chunks content, extracts entities with confidence scores.',
      role: 'The first intelligence layer. Every piece of client communication enters through Signal Processor. It decides what the content is (transcript vs email vs research), breaks it into meaningful chunks, and extracts structured entities: features, personas, pain points, stakeholders. Each extraction carries a confidence score that flows downstream.',
      inputs: ['Meeting transcripts', 'Email threads', 'Research documents'],
      outputs: ['Entity patches', 'Confidence scores', 'Signal metadata'],
      confidence: { high: 'Auto-apply entity to BRD', mid: 'Flag for consultant review', low: 'Queue as suggestion' },
      confPct: [45, 35, 20],
      evolution: [
        { when: 'Day 1', what: 'Rule-based classification + Haiku extraction', auto: '70%', done: true },
        { when: 'Week 2', what: 'Learns client vocabulary from corrections', auto: '82%', done: true },

// ═══ Layout & Render ════════════════════════════
function render() {
  const sc = SCENARIOS[S.scenario];
  const canvas = document.getElementById('canvas');

  // Compute bounding box
  let maxX = 0, maxY = 0;
  [...sc.dataSources, ...sc.outputs].forEach(n => { maxX = Math.max(maxX, n.x + 160); maxY = Math.max(maxY, n.y + 50); });
  sc.agents.forEach(a => { maxX = Math.max(maxX, a.x + a.w + 20); maxY = Math.max(maxY, a.y + 250); });

  canvas.style.minWidth = (maxX + 60) + 'px';
  canvas.style.minHeight = Math.max(460, maxY + 40) + 'px';

  // Build positions map for edge drawing
  const posMap = {};
  sc.dataSources.forEach(d => { posMap[d.id] = { x: d.x, y: d.y, w: 140, h: 36, type: 'data' }; });
  sc.outputs.forEach(o => { posMap[o.id] = { x: o.x, y: o.y, w: 150, h: 36, type: 'output' }; });
  sc.agents.forEach(a => { posMap[a.id] = { x: a.x, y: a.y, w: a.w, h: 220, type: 'agent' }; });

  // SVG edges
  let svgPaths = '';
  sc.edges.forEach(e => {
    const from = posMap[e.from], to = posMap[e.to];
    if (!from || !to) return;
    const x1 = from.x + from.w, y1 = from.y + from.h / 2;
    const x2 = to.x, y2 = to.y + to.h / 2;
    const cx1 = x1 + 40, cx2 = x2 - 40;
    const hl = S.hovered && (S.hovered === e.from || S.hovered === e.to);
    svgPaths += `<path class="edge-path ${hl ? 'hl' : ''}" d="M${x1},${y1} C${cx1},${y1} ${cx2},${y2} ${x2},${y2}"/>`;
    // Label
    const mx = (x1 + x2) / 2, my = (y1 + y2) / 2 - 6;
    if (S.mode === 'architect') {
      svgPaths += `<text class="edge-label" x="${mx}" y="${my}" text-anchor="middle">${e.label || ''}</text>`;
    }
  });

  const isArch = S.mode === 'architect';
  const isBuild = S.mode === 'build';

  canvas.innerHTML = `
    <svg class="edge-svg" style="width:${maxX+60}px;height:${Math.max(460,maxY+40)}px">${svgPaths}</svg>
    ${sc.dataSources.map(d => `
      <div class="data-node" style="left:${d.x}px;top:${d.y}px" data-id="${d.id}"
           onmouseenter="hover('${d.id}')" onmouseleave="unhover()">
        <span class="data-node-icon">${d.icon}</span>${d.label}
      </div>
    `).join('')}
    ${sc.outputs.map(o => `
      <div class="output-node" style="left:${o.x}px;top:${o.y}px" data-id="${o.id}"
           onmouseenter="hover('${o.id}')" onmouseleave="unhover()">
        <span class="output-node-icon">${o.icon}</span>${o.label}
      </div>
    `).join('')}
    ${sc.agents.map(a => {
      const dimmed = S.hovered && S.hovered !== a.id && !isEdgeConnected(sc, a.id, S.hovered);
      const selected = S.selected === a.id;
      return `
      <div class="flow-node ${dimmed?'dimmed':''} ${selected?'selected':''}" data-id="${a.id}"
           style="left:${a.x}px;top:${a.y}px;width:${a.w}px"
           onmouseenter="hover('${a.id}')" onmouseleave="unhover()"
           onclick="selectAgent('${a.id}')">
        <div class="fn-top">
          <div class="fn-icon" style="background:${a.iconBg}">${a.icon}</div>
          <div class="fn-name">${a.name}</div>
        </div>
        <div class="fn-technique tech-${a.technique}">${a.techniqueLabel}</div>
        ${isArch || isBuild ? `<div class="fn-desc">${a.desc}</div>` : ''}
        ${isArch ? `
          <div class="fn-io">
            <div class="fn-io-col">
              <div class="fn-io-label">In</div>
              ${a.inputs.slice(0,2).map(i=>`<div class="fn-io-item fn-io-in">${i}</div>`).join('')}
            </div>
            <div class="fn-io-col">
              <div class="fn-io-label">Out</div>
              ${a.outputs.slice(0,2).map(o=>`<div class="fn-io-item fn-io-out">${o}</div>`).join('')}
            </div>
          </div>
        ` : ''}
        <div class="fn-bar">
          <div class="fn-conf">
            <div class="fn-conf-dot" style="background:${a.confPct[0]>40?'var(--green)':'var(--amber)'}"></div>
            <div class="fn-conf-label">${a.confPct[0]}% high conf</div>
          </div>
          <div class="fn-rhythm rhythm-${a.rhythm}">${a.rhythmLabel}</div>
        </div>
        ${isBuild ? `
          <div style="margin-top:8px;font-size:9px;color:var(--text-muted)">
            ${a.evolution.filter(e=>e.done).length}/${a.evolution.length} milestones done
          </div>
        ` : ''}
      </div>`;
    }).join('')}
  `;
}

function isEdgeConnected(sc, id1, id2) {
  return sc.edges.some(e => (e.from === id1 && e.to === id2) || (e.from === id2 && e.to === id1));
}

function hover(id) { S.hovered = id; applyHover(); }
function unhover() { S.hovered = null; applyHover(); }

function applyHover() {
  const sc = SCENARIOS[S.scenario];
  document.querySelectorAll('.flow-node').forEach(el => {
    const id = el.dataset.id;
    if (!S.hovered) { el.classList.remove('dimmed'); return; }
    if (id === S.hovered || isEdgeConnected(sc, id, S.hovered)) el.classList.remove('dimmed');
    else el.classList.add('dimmed');
  });
  document.querySelectorAll('.edge-path').forEach(el => {
    // Re-render is simpler for SVG — skip for now, handled in render
  });
}

// ═══ Detail Panel ═══════════════════════════════
function selectAgent(id) {
  S.selected = id;
  const sc = SCENARIOS[S.scenario];
  const a = sc.agents.find(x => x.id === id);
  if (!a) return;

  const dp = document.getElementById('detail-panel');
  const overlay = document.getElementById('detail-overlay');

  // Header
  document.getElementById('dp-header').innerHTML = `
    <button class="dp-close" onclick="closeDetail()">×</button>
    <div class="dp-icon-row">
      <div class="dp-icon" style="background:${a.iconBg}">${a.icon}</div>
      <div>
        <div class="dp-name">${a.name}</div>
        <div class="dp-badges">
          <div class="dp-badge tech-${a.technique}">${a.techniqueLabel}</div>
          <div class="dp-badge rhythm-${a.rhythm}">${a.rhythmLabel}</div>
        </div>
      </div>
    </div>
    <div class="dp-role">${a.role}</div>
  `;

function closeDetail() {
  S.selected = null;
  document.getElementById('detail-panel').classList.remove('open');
  document.getElementById('detail-overlay').classList.remove('open');
  render();
}

// ═══ Try-It Tabs ════════════════════════════════
function switchTryTab(tab, el) {
  document.querySelectorAll('.try-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('try-panel-try').style.display = tab === 'try' ? 'block' : 'none';
  document.getElementById('try-panel-chat').style.display = tab === 'chat' ? 'block' : 'none';
}

// ═══ Run Agent ══════════════════════════════════
function runAgent(agentId) {
  const btn = document.getElementById('try-run-btn');
  const output = document.getElementById('try-output');
  const input = document.getElementById('try-input').value.trim();

  if (!input) { loadSampleInput(agentId); return; }

  btn.classList.add('loading');
  btn.innerHTML = '<span class="typing">⚡ Processing...</span>';

  // Simulate processing delay then render rich output
  setTimeout(() => {
    output.innerHTML = renderClientOutput(agentId, input);
    output.className = 'try-output visible';
    const sc = SCENARIOS[S.scenario];
    const a = sc.agents.find(x => x.id === agentId);
    btn.classList.remove('loading');
    btn.innerHTML = `⚡ Run ${a?.name || 'Agent'}`;
  }, 800 + Math.random() * 600);
}

// ═══ Chat ═══════════════════════════════════════
function sendChat(agentId) {
  const input = document.getElementById('chat-input');
  const q = input.value.trim();
  if (!q) return;
  input.value = '';

  const sc = SCENARIOS[S.scenario];
  const a = sc.agents.find(x => x.id === agentId);
  const thread = document.getElementById('chat-thread');

  // Add user message
  thread.innerHTML += `<div class="chat-msg user">${q}</div>`;

  // Generate contextual response
  const responses = {
    'cost': `Estimated cost per invocation:
• Classification (Haiku): ~$0.002/document
• Generation (Sonnet): ~$0.08/section
• Embedding search: ~$0.001/query

At ${a.name}'s expected volume: ~$${(Math.random()*50+10).toFixed(0)}/month. That's well under typical SaaS margins.`,
    'accuracy': `${a.name} confidence distribution:
• High confidence (auto-apply): ${a.confPct[0]}%
• Medium (human review): ${a.confPct[1]}%
• Low (queue/suggest): ${a.confPct[2]}%

Accuracy improves over time: ${a.evolution.filter(e=>!e.done).map(e=>'→ '+e.what+' ('+e.auto+')').join(', ')}`,
    'build': `Build path for ${a.name}:

${a.evolution.map((e,i) => `${e.done?'✅':'⬜'} ${e.when}: ${e.what} (${e.auto})`).join('\n')}

${a.evolution.filter(e=>e.done).length}/${a.evolution.length} milestones complete. Next up: ${a.evolution.find(e=>!e.done)?.what || 'fully mature'}.`,
    'risk': `Key risks for ${a.name}:
• Confidence gap: ${a.confPct[2]}% of outputs are low-confidence and need human review
• Cold start: needs real client data to improve beyond MVP
• Integration: depends on ${a.inputs.join(', ')} being available

Mitigation: ${a.confidence.low}`,
    'default': `${a.name} uses ${a.techniqueLabel} (${a.rhythmLabel}).

${a.role}

Current state: ${a.evolution.find(e=>e.done)?.auto || 'MVP'} automated. Next milestone: ${a.evolution.find(e=>!e.done)?.what || 'fully mature'}.

Value: ${a.value.metric} ${a.value.per} — ${a.value.detail}.`
  };

  const key = q.toLowerCase().includes('cost') ? 'cost'
    : q.toLowerCase().includes('accura') || q.toLowerCase().includes('confiden') ? 'accuracy'
    : q.toLowerCase().includes('build') || q.toLowerCase().includes('timeline') || q.toLowerCase().includes('roadmap') ? 'build'
    : q.toLowerCase().includes('risk') || q.toLowerCase().includes('fail') || q.toLowerCase().includes('wrong') ? 'risk'
    : 'default';

  // Simulate typing delay
  const typing = document.createElement('div');
  typing.className = 'chat-msg ai typing';
  typing.textContent = '...';
  thread.appendChild(typing);
  thread.scrollTop = thread.scrollHeight;

  setTimeout(() => {
    typing.remove();
    thread.innerHTML += `<div class="chat-msg ai" style="white-space:pre-wrap">${responses[key]}</div>`;
    thread.scrollTop = thread.scrollHeight;
  }, 400 + Math.random() * 400);
}

// ═══ Mode & Scenario ════════════════════════════
function setMode(m) {
  S.mode = m;
  document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + m)?.classList.add('active');
  closeDetail();
  render();
}

function setScenario(s) {
  S.scenario = s;
  S.selected = null; S.hovered = null;
  closeDetail();
  render();
}

render();
